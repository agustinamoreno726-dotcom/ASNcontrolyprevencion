/* ─────────────── ERROR BOUNDARY ─────────────── */
class ErrorBoundary extends React.Component {
  constructor(props) { super(props); this.state = { error: null }; }
  static getDerivedStateFromError(error) { return { error }; }
  componentDidCatch(error, info) { console.error("ASN Error:", error, info); }
  render() {
    if (this.state.error) return (
      <div style={{ display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", height:"100vh", gap:16, background:"#060606", padding:24 }}>
        <div style={{ fontSize:48 }}>⚠️</div>
        <div style={{ color:"#ef4444", fontWeight:900, fontSize:18, textAlign:"center" }}>Ocurrió un error</div>
        <div style={{ color:"#6b7280", fontSize:13, textAlign:"center", maxWidth:300 }}>{String(this.state.error.message || this.state.error)}</div>
        <button onClick={() => { this.setState({ error: null }); window.location.reload(); }}
          style={{ marginTop:8, padding:"12px 28px", borderRadius:12, background:"linear-gradient(135deg,#f97316,#ea580c)", border:"none", color:"#fff", fontWeight:700, fontSize:15, cursor:"pointer" }}>
          🔄 Reiniciar app
        </button>
      </div>
    );
    return this.props.children;
  }
}

/* ─────────────── FIREBASE HELPERS ─────────────── */
function useFirebase() {
  const [ready, setReady] = React.useState(!!window._firebaseReady);
  React.useEffect(() => {
    if (window._firebaseReady) return;
    const h = () => setReady(true);
    window.addEventListener("firebase-ready", h);
    return () => window.removeEventListener("firebase-ready", h);
  }, []);
  return ready;
}
async function fbAdd(col, data)       { const { db, collection, addDoc } = window._firebase; const ref = await addDoc(collection(db, col), data); return ref.id; }
async function fbUpdate(col, id, data){ const { db, doc, updateDoc } = window._firebase; await updateDoc(doc(db, col, id), data); }
async function fbDelete(col, id)      { const { db, doc, deleteDoc } = window._firebase; await deleteDoc(doc(db, col, id)); }

}

        {/* Inner ring fill: dark */}
        <radialGradient id={`inner-${id}`} cx="50%" cy="40%" r="60%">
          <stop offset="0%"   stopColor="#1c1c1e"/>

function Dashboard({ data, setPage }) {
  const { clients, checks, companies } = data;
  const [flotaModal, setFlotaModal] = useState(false);
  const totalClients   = clients.length;
  const totalChecks    = checks.length;
  const totalCompanies = companies.length;
  const totalVehicles  = companies.reduce((acc, c) => acc + (c.vehicles || []).length, 0);

  // Trailers
  const trailersClientes  = clients.filter(c => c.tieneTrailer).length;
  const trailersEmpresas  = companies.reduce((acc, c) => acc + (c.vehicles||[]).filter(v => v.tieneTrailer).length, 0);
  const totalTrailers     = trailersClientes + trailersEmpresas;
  // Trailers con algún ítem crítico
  const trailersCriticos = [
    ...clients.filter(c => c.tieneTrailer).map(c => c.trailerCheck || {}),
    ...companies.flatMap(c => (c.vehicles||[]).filter(v => v.tieneTrailer).map(v => v.trailerCheck || {})),
  ].filter(tc => TRAILER_CHECK_ITEMS.some(i => tc[i.id] === "critico")).length;

  // Chequeos del último mes
  const now = Date.now();
  const mesAtras = now - 30 * 24 * 60 * 60 * 1000;
  const checksEsteMes = checks.filter(c => c.createdAt > mesAtras).length;

  // Clientes con críticos
  const clientesConCriticos = checks.filter(ch => {
    const allItems = CHECK_SECTIONS.flatMap(s => s.items);
    return allItems.some(i => (ch.itemStates || {})[i.id] === "critico");
  }).length;

  // Distribución por plan
  const planCounts = PLANS.map(s => ({ ...s, count: clients.filter(c => c.service === s.id).length }));
  // Distribución por servicio adicional
  const extraCounts = EXTRA_SERVICES.map(s => ({ ...s, count: clients.filter(c => (c.extras||[]).includes(s.id)).length }));

  // Últimos 5 chequeos
  const recentChecks = [...checks].sort((a,b) => b.createdAt - a.createdAt).slice(0, 5);

  // Últimos clientes
  const recentClients = [...clients].sort((a,b) => b.createdAt - a.createdAt).slice(0, 3);

  // Estado global de flota (porcentaje OK promedio)
  let globalOk = null;
  if (checks.length > 0) {
    const allItems = CHECK_SECTIONS.flatMap(s => s.items);
    const totalOk = checks.reduce((acc, ch) => {
      return acc + allItems.filter(i => (ch.itemStates || {})[i.id] === "ok").length;
    }, 0);
    globalOk = Math.round((totalOk / (checks.length * allItems.length)) * 100);
  }

  return (
    <div style={{ padding:"14px 14px 100px", animation:"fadeSlideIn 0.2s ease" }}>
      <div style={{ marginBottom:20 }}>
        <p style={{ color:"#374151", margin:"0 0 2px", fontSize:11, fontWeight:600, letterSpacing:"0.12em", textTransform:"uppercase" }}>Panel de Control</p>
        <h2 style={{ margin:0, fontFamily:"'Barlow Condensed',sans-serif", fontWeight:900, fontSize:28, letterSpacing:"0.02em", lineHeight:1 }}>
          <span style={{ color:"#c8cdd4" }}>AS</span><span style={{ color:"#f97316" }}>N</span>
          <span style={{ color:"#252a32", fontSize:16, fontWeight:700, marginLeft:10, letterSpacing:"0.06em" }}>DASHBOARD</span>
        </h2>
        <div style={{ height:2, width:48, background:"linear-gradient(90deg,#f97316,#ea580c)", borderRadius:2, marginTop:8, boxShadow:"0 0 10px rgba(249,115,22,0.4)" }}/>
      </div>

      {/* Estadísticas principales */}
      <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:10, marginBottom:14 }}>
        <StatCard icon="👤" value={totalClients}   label="Clientes"  color="#f97316"/>
        <StatCard icon="🏢" value={totalCompanies} label="Empresas"  color="#60a5fa" sub={`${totalVehicles} vehículos`}/>
        <StatCard icon="✅" value={totalChecks}    label="Chequeos"  color="#10b981" sub={`${checksEsteMes} este mes`}/>
        <StatCard icon="⚠️" value={clientesConCriticos} label="Con críticos" color="#ef4444"/>
        <StatCard icon="🚐" value={totalTrailers}  label="Trailers"  color="#f59e0b" sub={trailersCriticos > 0 ? `${trailersCriticos} con críticos` : "Sin críticos"}/>
      </div>

      {/* Estado de trailers */}
      {totalTrailers > 0 && (
        <div style={{ background:"#1a1a1a", borderRadius:16, padding:16, marginBottom:14, border:"1px solid #f59e0b33" }}>
          <h3 style={{ color:"#e5e7eb", margin:"0 0 12px", fontSize:13, fontWeight:700, letterSpacing:"0.05em", textTransform:"uppercase" }}>🚐 Trailers registrados</h3>
          {clients.filter(c => c.tieneTrailer).map(c => {
            const tc = c.trailerCheck || {};
            const criticos = TRAILER_CHECK_ITEMS.filter(i => tc[i.id] === "critico").length;
            const ok = TRAILER_CHECK_ITEMS.filter(i => tc[i.id] === "ok").length;
            return (
              <div key={c.id} style={{ display:"flex", alignItems:"center", gap:10, marginBottom:8, paddingBottom:8, borderBottom:"1px solid #232323" }}>
                <span style={{ fontSize:20 }}>🚐</span>
                <div style={{ flex:1 }}>
                  <div style={{ color:"#e5e7eb", fontSize:13, fontWeight:600 }}>{c.name} <span style={{ color:"#6b7280", fontWeight:400 }}>· {c.plate}</span></div>
                  <div style={{ color:"#6b7280", fontSize:11 }}>Cliente particular</div>
                </div>
                <div style={{ textAlign:"right" }}>
                  <div style={{ color: criticos > 0 ? "#ef4444" : "#10b981", fontWeight:900, fontSize:13 }}>
                    {criticos > 0 ? `${criticos} críticos` : `${ok} OK`}
                  </div>
                </div>
              </div>
            );
          })}
          {companies.flatMap(comp => (comp.vehicles||[]).filter(v => v.tieneTrailer).map(v => {
            const tc = v.trailerCheck || {};
            const criticos = TRAILER_CHECK_ITEMS.filter(i => tc[i.id] === "critico").length;
            const ok = TRAILER_CHECK_ITEMS.filter(i => tc[i.id] === "ok").length;
            return (
              <div key={v.id} style={{ display:"flex", alignItems:"center", gap:10, marginBottom:8, paddingBottom:8, borderBottom:"1px solid #232323" }}>
                <span style={{ fontSize:20 }}>🚐</span>
                <div style={{ flex:1 }}>
                  <div style={{ color:"#e5e7eb", fontSize:13, fontWeight:600 }}>{v.plate} <span style={{ color:"#6b7280", fontWeight:400 }}>· {comp.name}</span></div>
                  <div style={{ color:"#6b7280", fontSize:11 }}>Empresa{v.nroMovil ? ` · Móvil ${v.nroMovil}` : ""}</div>
                </div>
                <div style={{ textAlign:"right" }}>
                  <div style={{ color: criticos > 0 ? "#ef4444" : "#10b981", fontWeight:900, fontSize:13 }}>
                    {criticos > 0 ? `${criticos} críticos` : `${ok} OK`}
                  </div>
                </div>
              </div>
            );
          }))}
        </div>
      )}

      {/* Salud de la flota */}
      {globalOk !== null && (() => {
        const allItems = CHECK_SECTIONS.flatMap(s => s.items);
        const totalItems = checks.length * allItems.length;
        const totalOkCount = checks.reduce((acc, ch) => acc + allItems.filter(i => (ch.itemStates||{})[i.id] === "ok").length, 0);
        const totalCriticoCount = checks.reduce((acc, ch) => acc + allItems.filter(i => (ch.itemStates||{})[i.id] === "critico").length, 0);
        const totalPrevencionCount = checks.reduce((acc, ch) => acc + allItems.filter(i => (ch.itemStates||{})[i.id] === "prevencion").length, 0);
        const totalSolicitarCount = checks.reduce((acc, ch) => acc + allItems.filter(i => (ch.itemStates||{})[i.id] === "solicitar").length, 0);
        const healthColor = globalOk >= 80 ? "#10b981" : globalOk >= 60 ? "#f59e0b" : "#ef4444";

        return (

            <div onClick={() => setFlotaModal(true)} style={{ background:"#1a1a1a", borderRadius:16, padding:16, marginBottom:14, border:`1px solid ${healthColor}44`, cursor:"pointer" }}>

                <span style={{ color:healthColor, fontWeight:900, fontSize:18 }}>{globalOk}%</span>

              <div style={{ width:"100%", height:10, background:"#2a2a2a", borderRadius:5, overflow:"hidden" }}>
                <div style={{ width:`${globalOk}%`, height:"100%", background: globalOk >= 80 ? "linear-gradient(90deg,#10b981,#059669)" : globalOk >= 60 ? "linear-gradient(90deg,#f59e0b,#d97706)" : "linear-gradient(90deg,#ef4444,#dc2626)", borderRadius:5, transition:"width 0.8s" }}/>
              </div>
              <div style={{ display:"flex", justifyContent:"space-between", marginTop:8, fontSize:11 }}>
                <span style={{ color:healthColor, fontWeight:700 }}>{healthLabel}</span>

              </div>

              <div style={{ position:"fixed", inset:0, zIndex:200, background:"#000000cc", display:"flex", alignItems:"center", justifyContent:"center", padding:20 }}

                <div style={{ background:"#1a1a1a", borderRadius:24, padding:24, border:`1px solid ${healthColor}44`, width:"100%", maxWidth:380, maxHeight:"80vh", overflowY:"auto" }}

                    <div style={{ color:healthColor, fontWeight:700, fontSize:14, marginTop:4 }}>{healthLabel}</div>

                  {/* Barra */}
                  <div style={{ width:"100%", height:12, background:"#2a2a2a", borderRadius:6, overflow:"hidden", marginBottom:20 }}>
                    <div style={{ width:`${globalOk}%`, height:"100%", background: globalOk >= 80 ? "linear-gradient(90deg,#10b981,#059669)" : globalOk >= 60 ? "linear-gradient(90deg,#f59e0b,#d97706)" : "linear-gradient(90deg,#ef4444,#dc2626)", borderRadius:6 }}/>
                  </div>

                  {/* Cómo se calcula */}
                  <div style={{ background:"#111", borderRadius:14, padding:14, marginBottom:16 }}>
                    <div style={{ color:"#9ca3af", fontSize:11, fontWeight:700, textTransform:"uppercase", marginBottom:10 }}>¿Cómo se calcula?</div>
                    <div style={{ color:"#6b7280", fontSize:12, lineHeight:1.6 }}>

                      <div style={{ color:"#10b981", fontSize:10, fontWeight:700, textTransform:"uppercase" }}>✅ OK</div>

                    <div style={{ background:"rgba(239,68,68,0.07)", border:"1px solid rgba(239,68,68,0.2)", borderRadius:12, padding:"12px 10px", textAlign:"center" }}>

                    <div style={{ background:"rgba(245,158,11,0.07)", border:"1px solid rgba(245,158,11,0.2)", borderRadius:12, padding:"12px 10px", textAlign:"center" }}>

                      <div style={{ color:"#f59e0b", fontSize:10, fontWeight:700, textTransform:"uppercase" }}>🟡 Prevención</div>

                  </div>

                  {/* Explicación colores */}
                  <div style={{ background:"#111", borderRadius:14, padding:14, marginBottom:16 }}>
                    <div style={{ color:"#9ca3af", fontSize:11, fontWeight:700, textTransform:"uppercase", marginBottom:10 }}>¿Qué significa cada color?</div>
                    {[
                      { color:"#10b981", icon:"🟢", label:"Verde ≥ 80%", desc:"Flota en buen estado general. Mantenimiento preventivo al día." },
                      { color:"#f59e0b", icon:"🟡", label:"Amarillo 60–79%", desc:"Hay ítems que requieren atención. Programar revisiones." },
                      { color:"#ef4444", icon:"🔴", label:"Rojo < 60%", desc:"Estado crítico. Varios vehículos con problemas que necesitan atención urgente." },

      {/* Planes y servicios adicionales */}
      <div style={{ background:"linear-gradient(145deg,#1c1c1c,#161616)", borderRadius:16, padding:16, marginBottom:14, border:"1px solid #232323", boxShadow:"0 4px 16px rgba(0,0,0,0.3), inset 0 1px 0 rgba(255,255,255,0.02)" }}>

        {planCounts.map(s => (
          <div key={s.id} style={{ display:"flex", alignItems:"center", gap:10, marginBottom:8 }}>
            <span style={{ fontSize:15 }}>{s.icon}</span>
            <span style={{ flex:1, color:"#9ca3af", fontSize:13 }}>{s.name}</span>
            <div style={{ width:80, height:6, background:"#2a2a2a", borderRadius:3, overflow:"hidden" }}>
              <div style={{ width: totalClients ? `${(s.count/totalClients)*100}%` : "0%", height:"100%", background:s.color, borderRadius:3, transition:"width 0.8s" }}/>

            <span style={{ color:"#e5e7eb", fontWeight:700, fontSize:13, minWidth:20, textAlign:"right" }}>{s.count}</span>

            ? <div style={{ color:"#3a3a3a", fontSize:12 }}>Sin servicios adicionales contratados</div>

                <span style={{ fontSize:14 }}>{s.icon}</span>
                <span style={{ flex:1, color:"#9ca3af", fontSize:13 }}>{s.name}</span>
                <span style={{ color:s.color, fontWeight:700, fontSize:13 }}>{s.count}</span>
              </div>
            ))
          }
        </div>
      </div>

      {/* Últimos chequeos */}
      {recentChecks.length > 0 && (
        <div style={{ background:"linear-gradient(145deg,#1c1c1c,#161616)", borderRadius:16, padding:16, marginBottom:14, border:"1px solid #232323", boxShadow:"0 4px 16px rgba(0,0,0,0.3), inset 0 1px 0 rgba(255,255,255,0.02)" }}>
          <h3 style={{ color:"#3d4451", margin:"0 0 14px", fontSize:10, fontWeight:700, letterSpacing:"0.14em", textTransform:"uppercase", fontFamily:"'Barlow Condensed',sans-serif" }}>Últimos Chequeos</h3>
          {recentChecks.map(ch => {
            const allItems = CHECK_SECTIONS.flatMap(s => s.items);
            const ok = allItems.filter(i => (ch.itemStates||{})[i.id] === "ok").length;
            const criticos = allItems.filter(i => (ch.itemStates||{})[i.id] === "critico").length;
            const pct = Math.round((ok / allItems.length) * 100);
            // Buscar cliente o vehículo de empresa
            let entityName = "—";
            const cli = data.clients.find(c => c.id === ch.clientId);
            if (cli) { entityName = `${cli.name} · ${cli.plate}`; }
            else {
              // buscar en vehículos de empresas
              for (const comp of data.companies) {
                const v = (comp.vehicles || []).find(v => v.id === ch.vehicleId);
                if (v) { entityName = `${comp.name} · ${v.plate}`; break; }
              }
            }
            return (
              <div key={ch.id} style={{ display:"flex", alignItems:"center", gap:10, marginBottom:10, paddingBottom:10, borderBottom:"1px solid #232323" }}>
                <div style={{ flex:1 }}>
                  <div style={{ color:"#e5e7eb", fontSize:13, fontWeight:600, marginBottom:2 }}>{entityName}</div>
                  <div style={{ color:"#4b5563", fontSize:11 }}>{new Date(ch.createdAt).toLocaleDateString("es-AR")}{ch.perito ? ` · ${ch.perito}` : ""}</div>

                <div style={{ textAlign:"right" }}>
                  <div style={{ color: criticos > 0 ? "#ef4444" : "#10b981", fontWeight:700, fontSize:13 }}>{criticos > 0 ? `${criticos} ⚠️` : `${pct}% ✓`}</div>
                  <div style={{ width:60, height:4, background:"#2a2a2a", borderRadius:2, overflow:"hidden", marginTop:4 }}>
                    <div style={{ width:`${pct}%`, height:"100%", background: criticos>0?"#ef4444":pct>=80?"#10b981":"#f59e0b", borderRadius:2 }}/>
                  </div>
                </div>
              </div>
            );
          })}
        </div>
      )}

      {/* Acceso rápido */}
      <div style={{ marginBottom:6 }}>
        <div style={{ color:"#2d3340", fontSize:9, fontWeight:700, textTransform:"uppercase", letterSpacing:"0.14em", marginBottom:8, fontFamily:"'Barlow Condensed',sans-serif" }}>Acceso rápido</div>
        <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:10, marginBottom:10 }}>
          <button onClick={() => setPage("new-client")} style={{ padding:"14px", background:"rgba(249,115,22,0.05)", border:"1px solid rgba(249,115,22,0.18)", borderRadius:12, color:"#f97316", fontWeight:700, fontSize:13, cursor:"pointer", letterSpacing:"0.02em" }}>
            ➕ Nuevo Cliente
          </button>
          <button onClick={() => setPage("new-company")} style={{ padding:"14px", background:"rgba(96,165,250,0.05)", border:"1px solid rgba(96,165,250,0.18)", borderRadius:12, color:"#60a5fa", fontWeight:700, fontSize:13, cursor:"pointer", letterSpacing:"0.02em" }}>
            🏢 Nueva Empresa
          </button>
        </div>
        <button onClick={() => setPage("new-maquina")} style={{ width:"100%", padding:"14px", background:"rgba(167,139,250,0.05)", border:"1px solid rgba(167,139,250,0.18)", borderRadius:12, color:"#a78bfa", fontWeight:700, fontSize:13, cursor:"pointer", marginBottom:10, letterSpacing:"0.02em" }}>
          🏗️ Nueva Máquina
        </button>
        <button onClick={() => setPage("repairs")} style={{ width:"100%", padding:"16px", background:"linear-gradient(135deg,#7c3aed,#6d28d9)", border:"none", borderRadius:14, color:"#fff", fontWeight:900, fontSize:15, cursor:"pointer", display:"flex", alignItems:"center", justifyContent:"center", gap:10 }}>
          🔧 Pedido de Reparaciones
        </button>
      </div>
    </div>
  );
}

      <input value={search} onChange={e => setSearch(e.target.value)} placeholder="Buscar nombre, dominio, teléfono..."

              <div style={{ color:"#6b7280", fontSize:12 }}>🚗 {c.plate||"—"} · 📱 {c.phone||"—"}</div>
              <div style={{ color:"#6b7280", fontSize:12 }}>{c.vehicle||""}</div>
              {(c.extras||[]).length > 0 && (
                <div style={{ display:"flex", flexWrap:"wrap", gap:4, marginTop:4 }}>
                  {(c.extras||[]).map(eid => {
                    const ex = EXTRA_SERVICES.find(e => e.id === eid);
                    return ex ? <span key={eid} style={{ fontSize:9, padding:"2px 8px", borderRadius:10, background:`${ex.color}10`, color:ex.color, fontWeight:800, border:`1px solid ${ex.color}25`, letterSpacing:"0.04em" }}>{ex.icon} {ex.name}</span> : null;

              <div style={{ color:svc?.color, fontSize:10, fontWeight:800, marginBottom:4, letterSpacing:"0.08em", textTransform:"uppercase" }}>{svc?.name}</div>

            </div>
          </div>
        );
      })}
    </div>

/* ─────────────── GENERAR INFORME WHATSAPP / PDF ─────────────── */
function generarInformeWpp(entity, ch, isCompanyVehicle = false) {
  const estados = ch.itemStates || {};
  const fecha = new Date(ch.createdAt).toLocaleDateString("es-AR");
  const criticos = []; const prevencion = []; const solicitar = [];

  CHECK_SECTIONS.forEach(sec => {
    sec.items.forEach(item => {
      const e = estados[item.id];
      if (e === "critico")    criticos.push(item.label);
      else if (e === "prevencion") prevencion.push(item.label);
      else if (e === "solicitar")  solicitar.push(item.label);
    });
  });

  const allItems = CHECK_SECTIONS.flatMap(s => s.items);
  const okCount = allItems.filter(i => estados[i.id] === "ok").length;

  let msg = "";
  msg += `🚗 *INFORME DE CONTROL VEHICULAR*\n`;
  msg += `*ASN · Control y Prevención Vehicular*\n`;
  msg += `━━━━━━━━━━━━━━━━━━━━\n\n`;
  if (isCompanyVehicle) {
    msg += `🏢 *Empresa:* ${entity.companyName}\n`;
    msg += `🔖 *Dominio:* ${entity.plate}\n`;
    msg += `🚘 *Vehículo:* ${entity.vehicle}\n`;
    if (entity.nroMovil) msg += `🔢 *Nro. Móvil:* ${entity.nroMovil}\n`;
  } else {
    const svc = SERVICES.find(s => s.id === entity.service);
    msg += `👤 *Cliente:* ${entity.name}\n`;
    msg += `🔖 *Dominio:* ${entity.plate}\n`;
    msg += `🚘 *Vehículo:* ${entity.vehicle}\n`;
    msg += `📦 *Plan:* ${svc?.name || "-"}\n`;
    if ((entity.extras||[]).length > 0) {
      const extrasNames = (entity.extras||[]).map(eid => EXTRA_SERVICES.find(e => e.id === eid)?.name).filter(Boolean);
      msg += `➕ *Servicios adicionales:* ${extrasNames.join(", ")}\n`;
    }
  }
  msg += `📅 *Fecha:* ${fecha}\n`;
  if (ch.kms)    msg += `🔢 *KMs:* ${ch.kms}\n`;
  if (ch.perito) msg += `👷 *Perito:* ${ch.perito}\n`;
  msg += `\n━━━━━━━━━━━━━━━━━━━━\n`;
  msg += `✅ Ítems OK: *${okCount}/${allItems.length}*\n`;
  msg += `━━━━━━━━━━━━━━━━━━━━\n\n`;
  if (criticos.length > 0)  { msg += `🔴 *CRÍTICO — Atención inmediata:*\n`; criticos.forEach(i => { msg += `  • ${i}\n`; }); msg += `\n`; }
  if (prevencion.length > 0){ msg += `🟡 *PREVENCIÓN — Seguimiento:*\n`; prevencion.forEach(i => { msg += `  • ${i}\n`; }); msg += `\n`; }
  if (solicitar.length > 0) { msg += `🔵 *SOLICITAR — Pendiente:*\n`; solicitar.forEach(i => { msg += `  • ${i}\n`; }); msg += `\n`; }

  // ── TRAILER ──
  if (ch.trailerIncluido && ch.trailerItemStates && Object.keys(ch.trailerItemStates).length > 0) {
    const ts = ch.trailerItemStates;
    const trCriticos = []; const trPrev = []; const trSolic = []; const trOk = [];
    TRAILER_CHECK_ITEMS.forEach(item => {
      const e = ts[item.id];
      if (e === "critico")    trCriticos.push(item.label);
      else if (e === "prevencion") trPrev.push(item.label);
      else if (e === "solicitar")  trSolic.push(item.label);
      else if (e === "ok")         trOk.push(item.label);
    });
    const trOkCount = trOk.length;
    const trTotal = TRAILER_CHECK_ITEMS.length;
    msg += `━━━━━━━━━━━━━━━━━━━━\n`;
    msg += `🚐 *CONTROL DE TRAILER*\n`;
    msg += `✅ Ítems OK: *${trOkCount}/${trTotal}*\n`;
    if (trCriticos.length > 0) { msg += `🔴 *Crítico:*\n`; trCriticos.forEach(i => { msg += `  • ${i}\n`; }); }
    if (trPrev.length > 0)     { msg += `🟡 *Prevención:*\n`; trPrev.forEach(i => { msg += `  • ${i}\n`; }); }
    if (trSolic.length > 0)    { msg += `🔵 *Solicitar:*\n`; trSolic.forEach(i => { msg += `  • ${i}\n`; }); }
    msg += `\n`;
  }

  if (ch.recomendaciones) { msg += `━━━━━━━━━━━━━━━━━━━━\n💡 *Recomendaciones:*\n${ch.recomendaciones}\n\n`; }
  if (ch.detalle)         { msg += `📝 *Detalle:*\n${ch.detalle}\n\n`; }
  msg += `━━━━━━━━━━━━━━━━━━━━\n_ASN · Control y Prevención Vehicular_`;
  return msg;
}

function exportarPDF(entity, ch, isCompanyVehicle = false) {
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({ orientation: "portrait", unit: "mm", format: "a4" });

  const estados = ch.itemStates || {};
  const fecha = new Date(ch.createdAt).toLocaleDateString("es-AR");
  const allItems = CHECK_SECTIONS.flatMap(s => s.items);
  const okCount        = allItems.filter(i => estados[i.id] === "ok").length;
  const criticoItems   = allItems.filter(i => estados[i.id] === "critico");
  const prevencionItems= allItems.filter(i => estados[i.id] === "prevencion");
  const solicitarItems = allItems.filter(i => estados[i.id] === "solicitar");
  const pct = Math.round((okCount / allItems.length) * 100);
  const barColor = criticoItems.length > 0 ? [239,68,68] : pct >= 80 ? [16,185,129] : [245,158,11];

  const W = 210, M = 14;
  let y = 14;

  // ── HEADER (fondo blanco, línea naranja) ──
  doc.setDrawColor(249,115,22); doc.setLineWidth(0.8);
  doc.line(M, y + 10, W - M, y + 10);
  doc.setFontSize(20); doc.setFont("helvetica","bold"); doc.setTextColor(249,115,22);
  doc.text("ASN", M, y + 7);
  doc.setFontSize(9); doc.setFont("helvetica","normal"); doc.setTextColor(107,114,128);
  doc.text("Control y Prevención Vehicular", M + 16, y + 4);
  doc.setFontSize(8); doc.setTextColor(55,65,81);
  doc.text("Informe de Control Vehicular", M + 16, y + 8.5);
  doc.setFontSize(8); doc.setTextColor(107,114,128);
  doc.text("Fecha: " + fecha + (ch.perito ? "   Perito: " + ch.perito : "") + (ch.kms ? "   KMs: " + ch.kms : ""), W - M, y + 4, { align:"right" });
  y += 16;

  // ── INFO VEHÍCULO (tabla gris claro) ──
  let infoBody = [];
  if (isCompanyVehicle) {
    infoBody = [["Empresa", entity.companyName||"—"],["Dominio",entity.plate||"—"],["Vehículo",entity.vehicle||"—"]];
    if (entity.nroMovil) infoBody.push(["Nro. Móvil", entity.nroMovil]);
  } else {
    const svc = SERVICES.find(s => s.id === entity.service);
    infoBody = [["Cliente",entity.name||"—"],["Dominio",entity.plate||"—"],["Vehículo",entity.vehicle||"—"],["Plan",svc?.name||"—"]];
  }
  doc.autoTable({
    startY: y,
    body: infoBody,
    theme: "plain",
    styles: { fontSize:9, cellPadding:2.5, textColor:[55,65,81] },
    columnStyles: { 0:{ fontStyle:"bold", textColor:[107,114,128], cellWidth:35 }, 1:{ textColor:[17,24,39] } },
    margin: { left:M, right:M },
  });
  y = doc.lastAutoTable.finalY + 5;

  // ── RESUMEN (4 tarjetas) ──
  const cards = [
    { val:okCount,              label:"OK",         color:[16,185,129] },
    { val:criticoItems.length,  label:"Críticos",   color:[239,68,68]  },
    { val:prevencionItems.length,label:"Prevención",color:[245,158,11] },
    { val:solicitarItems.length, label:"Solicitar", color:[96,165,250] },
  ];
  const cardW = (W - M*2 - 9) / 4;
  cards.forEach((c, i) => {
    const cx = M + i*(cardW+3);
    doc.setFillColor(249,250,251); doc.setDrawColor(229,231,235); doc.setLineWidth(0.3);
    doc.roundedRect(cx, y, cardW, 16, 2, 2, "FD");
    doc.setFontSize(14); doc.setFont("helvetica","bold"); doc.setTextColor(...c.color);
    doc.text(String(c.val), cx + cardW/2, y+9, { align:"center" });
    doc.setFontSize(7); doc.setFont("helvetica","normal"); doc.setTextColor(107,114,128);
    doc.text(c.label, cx + cardW/2, y+14, { align:"center" });
  });
  y += 20;

  // Barra de salud
  doc.setFillColor(229,231,235); doc.roundedRect(M, y, W-M*2, 4, 2, 2, "F");
  doc.setFillColor(...barColor); doc.roundedRect(M, y, (W-M*2)*pct/100, 4, 2, 2, "F");
  doc.setFontSize(7); doc.setTextColor(107,114,128);
  doc.text(pct + "% OK (" + okCount + "/" + allItems.length + " ítems)", W-M, y+3.5, { align:"right" });
  y += 8;

  // ── SECCIONES DE CHEQUEO ──
  const estadoColors = { ok:[16,185,129], critico:[239,68,68], prevencion:[245,158,11], solicitar:[96,165,250], no:[107,114,128] };

  CHECK_SECTIONS.forEach(sec => {
    const rows = sec.items.map(item => {
      const e = estados[item.id];
      const est = ESTADOS.find(x => x.id === e);
      return [item.label, est ? est.label : "—", e || ""];
    });

    doc.autoTable({
      startY: y,
      head: [[sec.icon + "  " + sec.title, "Estado"]],
      body: rows.map(r => [r[0], r[1]]),
      theme: "striped",
      styles: { fontSize:8, cellPadding:2, textColor:[55,65,81], fillColor:[255,255,255] },
      headStyles: { fillColor:[243,244,246], textColor:[55,65,81], fontStyle:"bold", fontSize:8 },
      alternateRowStyles: { fillColor:[249,250,251] },
      columnStyles: { 0:{ cellWidth:"auto" }, 1:{ cellWidth:26, halign:"right" } },
      margin: { left:M, right:M },
      didParseCell(data) {
        if (data.column.index === 1 && data.section === "body") {
          const stateKey = rows[data.row.index]?.[2];
          const col = estadoColors[stateKey] || [107,114,128];
          data.cell.styles.textColor = col;
          data.cell.styles.fontStyle = "bold";
        }
      },
    });
    y = doc.lastAutoTable.finalY + 3;
  });

  // ── TRAILER ──
  if (ch.trailerIncluido && ch.trailerItemStates && Object.keys(ch.trailerItemStates).length > 0) {
    const ts = ch.trailerItemStates;
    const trailerRows = TRAILER_CHECK_ITEMS.map(item => {
      const e = ts[item.id];
      const est = ESTADOS.find(x => x.id === e);
      return [item.label, est ? est.label : "—", e || ""];
    });
    doc.autoTable({
      startY: y,
      head: [["🚐  Control de Trailer", "Estado"]],
      body: trailerRows.map(r => [r[0], r[1]]),
      theme: "striped",
      styles: { fontSize:8, cellPadding:2, textColor:[55,65,81], fillColor:[255,255,255] },
      headStyles: { fillColor:[255,237,213], textColor:[154,52,18], fontStyle:"bold", fontSize:8 },
      alternateRowStyles: { fillColor:[255,247,237] },
      columnStyles: { 0:{ cellWidth:"auto" }, 1:{ cellWidth:26, halign:"right" } },
      margin: { left:M, right:M },
      didParseCell(data) {
        if (data.column.index === 1 && data.section === "body") {
          const stateKey = trailerRows[data.row.index]?.[2];
          const col = estadoColors[stateKey] || [107,114,128];
          data.cell.styles.textColor = col;
          data.cell.styles.fontStyle = "bold";
        }
      },
    });
    y = doc.lastAutoTable.finalY + 3;
  }

  // ── NOTAS ──
  if (ch.recomendaciones) {
    doc.setFillColor(255,251,235); doc.setDrawColor(252,211,77); doc.setLineWidth(0.3);
    const lines = doc.splitTextToSize(ch.recomendaciones, W-M*2-6);
    doc.roundedRect(M, y, W-M*2, lines.length*4+10, 2, 2, "FD");
    doc.setFontSize(8); doc.setFont("helvetica","bold"); doc.setTextColor(146,64,14);
    doc.text("Recomendaciones de mantenimiento", M+3, y+5);
    doc.setFont("helvetica","normal"); doc.setTextColor(92,64,14);
    doc.text(lines, M+3, y+10);
    y += lines.length*4+14;
  }
  if (ch.detalle) {
    doc.setFillColor(239,246,255); doc.setDrawColor(147,197,253); doc.setLineWidth(0.3);
    const lines = doc.splitTextToSize(ch.detalle, W-M*2-6);
    doc.roundedRect(M, y, W-M*2, lines.length*4+10, 2, 2, "FD");
    doc.setFontSize(8); doc.setFont("helvetica","bold"); doc.setTextColor(30,64,175);
    doc.text("Detalle general", M+3, y+5);
    doc.setFont("helvetica","normal"); doc.setTextColor(30,64,175);
    doc.text(lines, M+3, y+10);
    y += lines.length*4+14;
  }

  // ── FOOTER ──
  const pageH = doc.internal.pageSize.getHeight();
  doc.setDrawColor(249,115,22); doc.setLineWidth(0.5);
  doc.line(M, pageH-12, W-M, pageH-12);
  doc.setFontSize(7); doc.setFont("helvetica","normal"); doc.setTextColor(107,114,128);
  doc.text("ASN \xB7 Control y Prevencion Vehicular", M, pageH-7);
  doc.text("Generado: " + new Date().toLocaleDateString("es-AR"), W-M, pageH-7, { align:"right" });

  // ── DESCARGAR ──
  const nombre = (isCompanyVehicle
    ? "ASN_" + (entity.plate||"vehiculo")
    : "ASN_" + (entity.plate||"cliente")
  ).replace(/\s/g,"_") + "_" + fecha.replace(/\//g,"-") + ".pdf";
  doc.save(nombre);
}

function CheckDetailModal({ ch, entity, isCompanyVehicle, onClose }) {

          </div>
        </div>

        {/* Resumen numérico */}
        {(() => {
          const allItems = CHECK_SECTIONS.flatMap(s => s.items);
          const ok = allItems.filter(i => estados[i.id] === "ok").length;
          const critico = allItems.filter(i => estados[i.id] === "critico").length;
          const prev = allItems.filter(i => estados[i.id] === "prevencion").length;
          const solic = allItems.filter(i => estados[i.id] === "solicitar").length;
          const pct = Math.round((ok / allItems.length) * 100);
          return (
            <div style={{ background:"#1a1a1a", borderRadius:16, padding:14, marginBottom:14, border:"1px solid #2a2a2a" }}>
              <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr 1fr 1fr", gap:6, marginBottom:10 }}>
                {[{v:ok,l:"OK",c:"#10b981"},{v:critico,l:"Crítico",c:"#ef4444"},{v:prev,l:"Prev.",c:"#f59e0b"},{v:solic,l:"Solicit.",c:"#60a5fa"}].map(({v,l,c})=>(
                  <div key={l} style={{ background:"#0f0f0f", borderRadius:10, padding:"8px 4px", textAlign:"center", border:`1px solid ${c}22` }}>
                    <div style={{ color:c, fontWeight:900, fontSize:20 }}>{v}</div>
                    <div style={{ color:"#6b7280", fontSize:10 }}>{l}</div>
                  </div>
                ))}
              </div>
              <div style={{ width:"100%", height:5, background:"#111", borderRadius:3, overflow:"hidden" }}>
                <div style={{ width:`${pct}%`, height:"100%", borderRadius:3, background: critico > 0 ? "#ef4444" : pct >= 80 ? "#10b981" : "#f59e0b" }}/>
              </div>
              <div style={{ color:"#6b7280", fontSize:11, textAlign:"right", marginTop:4 }}>{pct}% OK ({ok}/{allItems.length})</div>
            </div>
          );
        })()}

        {/* Secciones */}
        {CHECK_SECTIONS.map(sec => {
          const items = sec.items.map(item => ({ ...item, estadoId: estados[item.id] }));
          const sinEstado = items.filter(i => !i.estadoId).length;
          return (
            <div key={sec.id} style={{ background:"#1a1a1a", borderRadius:14, padding:14, marginBottom:10, border:"1px solid #2a2a2a" }}>
              <div style={{ color:"#e5e7eb", fontWeight:700, fontSize:13, textTransform:"uppercase", letterSpacing:"0.05em", marginBottom:10 }}>{sec.icon} {sec.title}</div>
              {items.map(item => {
                const est = ESTADOS.find(e => e.id === item.estadoId);

                  <div key={item.id} style={{ display:"flex", justifyContent:"space-between", alignItems:"center", padding:"7px 0", borderBottom:"1px solid #232323" }}>

                    {est

                      : <span style={{ color:"#3a3a3a", fontSize:11 }}>—</span>

                );

          );
        })}

        {/* Trailer */}
        {tieneTrailerEnCheck && (
          <div style={{ background:"#1a1a1a", borderRadius:14, padding:14, marginBottom:10, border:"1px solid #f9731633" }}>
            <div style={{ color:"#f97316", fontWeight:700, fontSize:13, textTransform:"uppercase", letterSpacing:"0.05em", marginBottom:10 }}>🚐 Trailer</div>
            {TRAILER_CHECK_ITEMS.map(item => {
              const estadoId = trailerStates[item.id];
              const est = ESTADOS.find(e => e.id === estadoId);
              return (
                <div key={item.id} style={{ display:"flex", justifyContent:"space-between", alignItems:"center", padding:"7px 0", borderBottom:"1px solid #232323" }}>
                  <span style={{ color: est ? "#e5e7eb" : "#4b5563", fontSize:13 }}>{item.label}</span>
                  {est

                    : <span style={{ color:"#3a3a3a", fontSize:11 }}>—</span>
                  }
                </div>
              );
            })}
          </div>
        )}

        {/* Notas */}
        {(ch.recomendaciones || ch.detalle) && (
          <div style={{ background:"#1a1a1a", borderRadius:14, padding:14, marginBottom:10, border:"1px solid #2a2a2a" }}>
            {ch.recomendaciones && <div style={{ marginBottom: ch.detalle ? 10 : 0 }}><div style={{ color:"#f59e0b", fontSize:11, fontWeight:700, textTransform:"uppercase", marginBottom:4 }}>💡 Recomendaciones</div><div style={{ color:"#9ca3af", fontSize:13 }}>{ch.recomendaciones}</div></div>}
            {ch.detalle && <div><div style={{ color:"#60a5fa", fontSize:11, fontWeight:700, textTransform:"uppercase", marginBottom:4 }}>📝 Detalle</div><div style={{ color:"#9ca3af", fontSize:13 }}>{ch.detalle}</div></div>}
          </div>
        )}
      </div>
    </div>
  );
}

/* ─────────────── CLIENT DETAIL ─────────────── */
function ClientDetail({ client, data, setPage, setCheckPreselectedClientId }) {
  const svc = SERVICES.find(s => s.id === client.service);
  const clientChecks = data.checks.filter(ch => ch.clientId === client.id).sort((a,b) => b.createdAt - a.createdAt);
  const [tab, setTab] = useState("chequeos"); // "chequeos" | "reparaciones"
  const [showRepairForm, setShowRepairForm] = useState(false);
  const [saving, setSaving] = useState(false);
  const [viewingCheck, setViewingCheck] = useState(null); // check a ver en detalle

  // Reparaciones guardadas en el doc del cliente
  const repairs = client.repairs || [];

  async function addRepair(repData) {
    setSaving(true);
    const updated = [...repairs, repData];
    await fbUpdate("clients", client.id, { repairs: updated });
    setShowRepairForm(false);
    setSaving(false);
  }

  async function deleteRepair(idx) {
    const updated = repairs.filter((_, i) => i !== idx);
    await fbUpdate("clients", client.id, { repairs: updated });
  }

  async function toggleRepairEstado(idx, newEstado) {
    const updated = repairs.map((r, i) => i === idx ? { ...r, estado: newEstado } : r);
    await fbUpdate("clients", client.id, { repairs: updated });
  }

  function shareRepair(r) {
    const cat = REPAIR_CATS.find(c => c.id === r.categoria);
    const msg = `🔧 *REPARACIÓN — ASN Control Vehicular*\n` +
      `👤 Cliente: ${client.name}\n🚗 Vehículo: ${client.vehicle}\n🔖 Dominio: ${client.plate}\n` +
      `━━━━━━━━━━━━━━━━━━━━\n` +
      `📋 ${r.descripcion}\n` +
      `📂 Categoría: ${cat?.label || r.categoria}\n` +
      `📅 Fecha: ${new Date(r.createdAt).toLocaleDateString("es-AR")}\n` +
      `💰 Costo: ${formatMoney(r.costo)}\n` +
      (r.taller ? `🏪 Taller: ${r.taller}\n` : "") +
      (r.notas ? `📝 Notas: ${r.notas}\n` : "") +
      `━━━━━━━━━━━━━━━━━━━━\n_ASN · Control y Prevención Vehicular_`;
    let tel = (client.phone||"").replace(/\D/g, "");
    if (tel.startsWith("0")) tel = tel.slice(1);
    if (!tel.startsWith("54")) tel = "549" + tel;
    else if (tel.startsWith("54") && !tel.startsWith("549")) tel = "549" + tel.slice(2);
    window.open("https://wa.me/" + tel + "?text=" + encodeURIComponent(msg), "_blank");
  }

  const [confirmDeleteId, setConfirmDeleteId] = useState(null);
  async function deleteCheck(checkId) {
    await fbDelete("checks", checkId);
    setConfirmDeleteId(null);
  }

  async function deleteClient() {
    if (!confirm(`¿Eliminar a ${client.name}?`)) return;
    for (const ch of clientChecks) await fbDelete("checks", ch.id);
    await fbDelete("clients", client.id);
    setPage("clients");
  }

  function enviarWpp(ch) {
    const msg = generarInformeWpp(client, ch, false);
    let tel = (client.phone||"").replace(/\D/g, "");
    if (tel.startsWith("0")) tel = tel.slice(1);
    if (!tel.startsWith("54")) tel = "549" + tel;
    else if (tel.startsWith("54") && !tel.startsWith("549")) tel = "549" + tel.slice(2);
    window.open("https://wa.me/" + tel + "?text=" + encodeURIComponent(msg), "_blank");
  }

  function copiarInforme(ch) {
    const msg = generarInformeWpp(client, ch, false);
    navigator.clipboard.writeText(msg).then(() => alert("✅ Informe copiado al portapapeles")).catch(() => alert("No se pudo copiar"));
  }

  return (
    <div style={{ padding:"14px 14px 100px", animation:"fadeSlideIn 0.2s ease" }}>
      <button onClick={() => setPage("clients")} style={{ background:"none", border:"none", color:"#c2400c", cursor:"pointer", fontSize:13, fontWeight:700, marginBottom:16, padding:"6px 0", letterSpacing:"0.04em" }}>← Volver</button>
      <div style={{ background:"#1a1a1a", borderRadius:20, padding:20, border:`1px solid ${svc?.color}44`, marginBottom:16 }}>
        <div style={{ display:"flex", alignItems:"center", gap:14, marginBottom:16 }}>
          <div style={{ width:56, height:56, borderRadius:16, background:`${svc?.color}22`, border:`2px solid ${svc?.color}`, display:"flex", alignItems:"center", justifyContent:"center", fontSize:26 }}>{svc?.icon}</div>
          <div>
            <h2 style={{ color:"#f1f5f9", margin:0, fontSize:20, fontWeight:900 }}>{client.name}</h2>
            <span style={{ color:svc?.color, fontSize:12, fontWeight:700 }}>Plan {svc?.name}</span>
          </div>
        </div>
        {[["Teléfono", client.phone], ["Vehículo", client.vehicle], ["Dominio", client.plate], client.notes && ["Notas", client.notes]].filter(Boolean).map(([l,v]) => (
          <div key={l} style={{ display:"flex", justifyContent:"space-between", gap:8, marginBottom:8 }}>
            <span style={{ color:"#6b7280", fontSize:13 }}>{l}</span>
            <span style={{ color:"#e5e7eb", fontSize:13, fontWeight:600, textAlign:"right" }}>{v}</span>
          </div>
        ))}
        {/* Servicios adicionales */}
        {(client.extras||[]).length > 0 && (
          <div style={{ marginTop:10, paddingTop:10, borderTop:"1px solid #2a2a2a" }}>
            <div style={{ color:"#6b7280", fontSize:11, fontWeight:700, textTransform:"uppercase", marginBottom:8 }}>Servicios adicionales</div>
            <div style={{ display:"flex", flexWrap:"wrap", gap:6 }}>
              {(client.extras||[]).map(eid => {
                const ex = EXTRA_SERVICES.find(e => e.id === eid);
                if (!ex) return null;
                return <span key={eid} style={{ fontSize:11, fontWeight:700, padding:"4px 10px", borderRadius:20, background:`${ex.color}18`, color:ex.color, border:`1px solid ${ex.color}44` }}>{ex.icon} {ex.name}</span>;
              })}
            </div>
          </div>
        )}

        {/* Trailer */}
        {client.tieneTrailer && (
          <div style={{ marginTop:10, paddingTop:10, borderTop:"1px solid #2a2a2a" }}>
            <div style={{ color:"#f97316", fontSize:11, fontWeight:700, textTransform:"uppercase", marginBottom:8 }}>🚐 Control de Trailer</div>
            <div style={{ display:"flex", flexDirection:"column", gap:6 }}>
              {TRAILER_CHECK_ITEMS.map(item => {
                const estadoId = (client.trailerCheck||{})[item.id];
                const est = ESTADOS.find(e => e.id === estadoId);
                return (
                  <div key={item.id} style={{ display:"flex", justifyContent:"space-between", alignItems:"center" }}>
                    <span style={{ color:"#9ca3af", fontSize:12 }}>{item.label}</span>
                    {est
                      ? <span style={{ fontSize:10, fontWeight:700, padding:"2px 10px", borderRadius:20, background:est.bg, color:est.color, border:`1px solid ${est.color}33`, letterSpacing:"0.06em" }}>{est.label}</span>
                      : <span style={{ color:"#4b5563", fontSize:11 }}>—</span>
                    }
                  </div>
                );
              })}
            </div>
          </div>
        )}
      </div>

      {/* Botón nuevo chequeo */}
      {setCheckPreselectedClientId && (
        <button onClick={() => { setCheckPreselectedClientId(client.id); setPage("checks"); }}
          style={{ width:"100%", marginBottom:12, padding:"14px", background:"linear-gradient(135deg,#f97316,#ea580c)", border:"none", color:"#fff", borderRadius:14, cursor:"pointer", fontWeight:900, fontSize:15, display:"flex", alignItems:"center", justifyContent:"center", gap:8 }}>
          ✅ Nuevo chequeo para este vehículo
        </button>
      )}

      {/* Tabs */}
      <div style={{ display:"grid", gridTemplateColumns: client.tieneTrailer ? "1fr 1fr 1fr" : "1fr 1fr", gap:8, marginBottom:16 }}>
        <button onClick={() => setTab("chequeos")} style={{ padding:"10px", borderRadius:10, cursor:"pointer", border:`2px solid ${tab==="chequeos" ? "#f97316" : "#2a2a2a"}`, background: tab==="chequeos" ? "#f9731622" : "#111", color: tab==="chequeos" ? "#f97316" : "#6b7280", fontWeight:700, fontSize:13 }}>
          ✅ Chequeos ({clientChecks.length})
        </button>
        <button onClick={() => setTab("reparaciones")} style={{ padding:"10px", borderRadius:10, cursor:"pointer", border:`1px solid ${tab==="reparaciones" ? "#a78bfa" : "#222"}`, background: tab==="reparaciones" ? "rgba(167,139,250,0.1)" : "#111", color: tab==="reparaciones" ? "#a78bfa" : "#374151", fontWeight:700, fontSize:12, letterSpacing:"0.04em" }}>
          🔧 Reparaciones ({repairs.length})
        </button>
        {client.tieneTrailer && (
          <button onClick={() => setTab("trailer")} style={{ padding:"10px", borderRadius:10, cursor:"pointer", border:`2px solid ${tab==="trailer" ? "#f59e0b" : "#2a2a2a"}`, background: tab==="trailer" ? "#f59e0b22" : "#111", color: tab==="trailer" ? "#f59e0b" : "#6b7280", fontWeight:700, fontSize:13 }}>
            🚐 Trailer
          </button>
        )}
      </div>

      {tab === "chequeos" && (<>
        {clientChecks.length === 0
          ? <div style={{ color:"#4b5563", textAlign:"center", padding:"24px 0", fontSize:14 }}>Sin chequeos registrados</div>
          : clientChecks.map(ch => {
              const allItems = CHECK_SECTIONS.flatMap(s => s.items);
              const estados = ch.itemStates || {};
              const ok = allItems.filter(i => estados[i.id] === "ok").length;
              const criticos = allItems.filter(i => estados[i.id] === "critico").length;
              const pct = Math.round((ok / allItems.length) * 100);
              return (
                <div key={ch.id} style={{ background:"linear-gradient(145deg,#1b1b1b,#141414)", borderRadius:14, padding:"14px 16px", border:"1px solid #222", marginBottom:12, boxShadow:"0 2px 12px rgba(0,0,0,0.25)" }}>
                  <div style={{ display:"flex", justifyContent:"space-between", marginBottom:8 }}>
                    <span style={{ color:"#9ca3af", fontSize:12 }}>{new Date(ch.createdAt).toLocaleDateString("es-AR")}{ch.perito ? ` · ${ch.perito}` : ""}</span>
                    <span style={{ color: criticos > 0 ? "#ef4444" : "#10b981", fontWeight:700, fontSize:14 }}>{criticos > 0 ? `${criticos} críticos` : `${ok} OK`}</span>
                  </div>
                  <div style={{ width:"100%", height:5, background:"#1a1a1a", borderRadius:3, overflow:"hidden", marginBottom:8 }}>
                    <div style={{ width:`${pct}%`, height:"100%", borderRadius:3, background: criticos > 0 ? "#ef4444" : pct >= 80 ? "#10b981" : "#f59e0b" }}/>
                  </div>
                  {ch.recomendaciones && <div style={{ color:"#6b7280", fontSize:12, marginBottom:4 }}>💡 {ch.recomendaciones}</div>}
                  {ch.detalle && <div style={{ color:"#6b7280", fontSize:12, marginBottom:8 }}>📝 {ch.detalle}</div>}
                  <div style={{ display:"flex", gap:8, marginTop:10 }}>
                    <button onClick={() => setViewingCheck(ch)} style={{ padding:"10px 12px", borderRadius:10, background:"#1a1a1a", border:"1px solid #333", color:"#9ca3af", fontWeight:700, fontSize:11, cursor:"pointer" }}>
                      🔍 Ver
                    </button>
                    <button onClick={() => enviarWpp(ch)} style={{ flex:1, padding:"10px 8px", borderRadius:10, background:"linear-gradient(135deg,#22c55e,#15803d)", border:"none", color:"#fff", fontWeight:700, fontSize:11, cursor:"pointer", display:"flex", alignItems:"center", justifyContent:"center", gap:5, letterSpacing:"0.04em" }}>
                      💬 WhatsApp
                    </button>
                    <button onClick={() => exportarPDF(client, ch, false)} style={{ flex:1, padding:"10px 8px", borderRadius:10, background:"linear-gradient(135deg,#ef4444,#991b1b)", border:"none", color:"#fff", fontWeight:700, fontSize:11, cursor:"pointer", display:"flex", alignItems:"center", justifyContent:"center", gap:5, letterSpacing:"0.04em" }}>
                      📄 PDF
                    </button>
                    <button onClick={() => copiarInforme(ch)} style={{ padding:"10px 12px", borderRadius:10, background:"#161616", border:"1px solid #252525", color:"#4b5563", fontWeight:700, fontSize:13, cursor:"pointer" }}>
                      📋
                    </button>
                    <button onClick={() => setConfirmDeleteId(ch.id)} style={{ padding:"10px 12px", borderRadius:10, background:"transparent", border:"1px solid rgba(239,68,68,0.2)", color:"#ef4444", fontWeight:700, fontSize:13, cursor:"pointer" }}>
                      🗑️
                    </button>
                  </div>
                </div>
              );
            })
        }
      </>)}

      {tab === "reparaciones" && (<>
        <RepairStats repairs={repairs}/>
        <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:12 }}>
          <h3 style={{ color:"#e5e7eb", fontSize:13, fontWeight:700, letterSpacing:"0.05em", textTransform:"uppercase", margin:0 }}>Historial de Reparaciones</h3>
          {!showRepairForm && <button onClick={() => setShowRepairForm(true)} style={{ padding:"8px 14px", borderRadius:10, background:"#7c3aed22", border:"1px solid #7c3aed44", color:"#a78bfa", fontWeight:700, fontSize:12, cursor:"pointer" }}>+ Agregar</button>}
        </div>
        {showRepairForm && <RepairForm onSave={addRepair} onCancel={() => setShowRepairForm(false)}/>}
        <RepairList repairs={repairs} onDelete={deleteRepair} onShare={shareRepair} onToggleEstado={toggleRepairEstado}/>
      </>)}

      {confirmDeleteId && (
        <div style={{ position:"fixed", inset:0, background:"rgba(0,0,0,0.85)", backdropFilter:"blur(4px)", zIndex:300, display:"flex", alignItems:"center", justifyContent:"center", padding:24 }}>
          <div style={{ background:"linear-gradient(145deg,#1c1c1c,#141414)", borderRadius:18, padding:24, maxWidth:320, width:"100%", border:"1px solid rgba(239,68,68,0.25)", boxShadow:"0 20px 60px rgba(0,0,0,0.8)" }}>
            <div style={{ fontSize:36, textAlign:"center", marginBottom:12 }}>🗑️</div>
            <div style={{ color:"#e8eaed", fontFamily:"'Barlow Condensed',sans-serif", fontWeight:800, fontSize:20, textAlign:"center", marginBottom:8, letterSpacing:"0.03em" }}>¿Eliminar chequeo?</div>
            <div style={{ color:"#4b5563", fontSize:13, textAlign:"center", marginBottom:20 }}>Esta acción no se puede deshacer.</div>
            <div style={{ display:"flex", gap:10 }}>
              <button onClick={() => setConfirmDeleteId(null)} style={{ flex:1, padding:"12px", borderRadius:10, background:"#111", border:"1px solid #222", color:"#6b7280", fontWeight:700, fontSize:14, cursor:"pointer" }}>Cancelar</button>
              <button onClick={() => deleteCheck(confirmDeleteId)} style={{ flex:1, padding:"12px", borderRadius:10, background:"linear-gradient(135deg,#ef4444,#991b1b)", border:"none", color:"#fff", fontWeight:800, fontSize:14, cursor:"pointer", boxShadow:"0 4px 16px rgba(239,68,68,0.3)" }}>Eliminar</button>
            </div>
          </div>
        </div>
      )}

      {tab === "trailer" && client.tieneTrailer && (
        <TrailerHistorial
          entity={client}
          tipo="client"
          onSave={async (trailerCheck) => {
            await fbUpdate("clients", client.id, { trailerCheck });
          }}
          onAddHistorial={async (entry) => {
            const hist = [...(client.trailerHistorial || []), entry];
            await fbUpdate("clients", client.id, { trailerHistorial: hist });
          }}
          onDeleteHistorial={async (idx) => {
            const hist = (client.trailerHistorial || []).filter((_, i) => i !== idx);
            await fbUpdate("clients", client.id, { trailerHistorial: hist });
          }}
        />
      )}

      <button onClick={deleteClient} style={{ width:"100%", marginTop:16, padding:"13px", background:"rgba(239,68,68,0.04)", border:"1px solid rgba(239,68,68,0.2)", color:"#ef4444", borderRadius:12, cursor:"pointer", fontWeight:700, fontSize:13, letterSpacing:"0.06em" }}>
        🗑️ Eliminar cliente
      </button>

      {/* Modal detalle de chequeo */}
      {viewingCheck && (
        <CheckDetailModal
          ch={viewingCheck}
          entity={client}
          isCompanyVehicle={false}
          onClose={() => setViewingCheck(null)}
        />
      )}
    </div>
  );
}

/* ─────────────── NEW CLIENT ─────────────── */
function Field({ label, value, onChange, placeholder, type="text" }) {
  return (
    <div>
      <label style={{ color:"#4b5563", fontSize:10, fontWeight:700, letterSpacing:"0.12em", textTransform:"uppercase", display:"block", marginBottom:8, fontFamily:"'Barlow Condensed',sans-serif" }}>{label}</label>
      <input type={type} value={value} onChange={e => onChange(e.target.value)} placeholder={placeholder}
        style={{ width:"100%", padding:"12px 14px", borderRadius:10, background:"#111", border:"1px solid #2a2a2a", color:"#e5e7eb", fontSize:14, outline:"none", boxShadow:"inset 0 1px 4px rgba(0,0,0,0.4)" }}/>
    </div>
  );
}

function NewClient({ data, setPage }) {
  const [form, setForm] = useState({ name:"", phone:"", vehicle:"", plate:"", service:"base", extras:[], notes:"", tieneTrailer:false, trailerCheck:{} });
  const [saved, setSaved] = useState(false);
  function set(k, v) { setForm(f => ({ ...f, [k]: v })); }
  function toggleExtra(id) {
    setForm(f => ({
      ...f,
      extras: f.extras.includes(id) ? f.extras.filter(e => e !== id) : [...f.extras, id]
    }));
  }
  async function handleSave() {
    if (!form.name || !form.phone || !form.vehicle || !form.plate) { alert("Completá nombre, teléfono, vehículo y dominio."); return; }
    await fbAdd("clients", { ...form, createdAt: Date.now() });
    setSaved(true);
    setTimeout(() => { setSaved(false); setPage("clients"); }, 1200);
  }
  if (saved) return (
    <div style={{ display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", height:"80vh", gap:16 }}>
      <div style={{ fontSize:64 }}>✅</div>
      <div style={{ fontFamily:"'Barlow Condensed',sans-serif", color:"#10b981", fontWeight:900, fontSize:24, letterSpacing:"0.04em", textTransform:"uppercase" }}>Cliente guardado</div>
    </div>
  );
  return (
    <div style={{ padding:"14px 14px 100px", animation:"fadeSlideIn 0.2s ease" }}>
      <h2 style={{ fontFamily:"'Barlow Condensed',sans-serif", color:"#f97316", margin:"0 0 20px", fontSize:26, fontWeight:900, letterSpacing:"0.03em", textTransform:"uppercase" }}>Nuevo Cliente</h2>
      <div style={{ display:"flex", flexDirection:"column", gap:14 }}>
        <Field label="Nombre completo" value={form.name} onChange={v => set("name",v)} placeholder="Juan Pérez"/>
        <Field label="Teléfono" value={form.phone} onChange={v => set("phone",v)} placeholder="11-2345-6789" type="tel"/>
        <Field label="Vehículo" value={form.vehicle} onChange={v => set("vehicle",v)} placeholder="Toyota Corolla 2020"/>
        <Field label="Dominio / Patente" value={form.plate} onChange={v => set("plate",v.toUpperCase())} placeholder="AB123CD"/>

        {/* Plan base */}
        <div>
          <label style={{ color:"#9ca3af", fontSize:12, fontWeight:700, letterSpacing:"0.05em", textTransform:"uppercase", display:"block", marginBottom:8 }}>Plan contratado</label>
          <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr 1fr", gap:8 }}>
            {PLANS.map(s => (
              <button key={s.id} onClick={() => set("service", s.id)} style={{ padding:"12px 6px", borderRadius:12, cursor:"pointer", border:`1px solid ${form.service===s.id ? s.color : "#222"}`, background: form.service===s.id ? `${s.color}12` : "#111", color: form.service===s.id ? s.color : "#374151", fontWeight:700, fontSize:12, display:"flex", flexDirection:"column", alignItems:"center", gap:4 }}>
                <span style={{ fontSize:20 }}>{s.icon}</span>
                <span>{s.name}</span>
              </button>
            ))}
          </div>
        </div>

        {/* Servicios adicionales */}
        <div>
          <label style={{ color:"#9ca3af", fontSize:12, fontWeight:700, letterSpacing:"0.05em", textTransform:"uppercase", display:"block", marginBottom:8 }}>Servicios adicionales <span style={{ color:"#4b5563", fontWeight:400, textTransform:"none", fontSize:11 }}>(opcional, múltiple)</span></label>
          <div style={{ display:"flex", flexDirection:"column", gap:8 }}>
            {EXTRA_SERVICES.map(s => {
              const active = form.extras.includes(s.id);
              return (
                <button key={s.id} onClick={() => toggleExtra(s.id)} style={{ padding:"11px 14px", borderRadius:12, cursor:"pointer", border:`1px solid ${active ? s.color : "#202020"}`, background: active ? `${s.color}10` : "#111", color: active ? s.color : "#374151", fontWeight:700, fontSize:13, display:"flex", alignItems:"center", gap:10, textAlign:"left" }}>
                  <span style={{ fontSize:18 }}>{s.icon}</span>
                  <span style={{ flex:1 }}>{s.name}</span>
                  <span style={{ fontSize:16 }}>{active ? "✓" : "+"}</span>
                </button>
              );
            })}
          </div>
        </div>

        {/* Trailer */}
        <div>
          <label style={{ color:"#9ca3af", fontSize:12, fontWeight:700, letterSpacing:"0.05em", textTransform:"uppercase", display:"block", marginBottom:8 }}>¿Tiene trailer?</label>
          <button onClick={() => set("tieneTrailer", !form.tieneTrailer)}
            style={{ width:"100%", padding:"12px 14px", borderRadius:12, cursor:"pointer", border:`2px solid ${form.tieneTrailer ? "#f97316" : "#2a2a2a"}`, background: form.tieneTrailer ? "#f9731622" : "#1a1a1a", color: form.tieneTrailer ? "#f97316" : "#6b7280", fontWeight:700, fontSize:14, display:"flex", alignItems:"center", gap:10, textAlign:"left" }}>
            <span style={{ fontSize:20 }}>🚐</span>
            <span style={{ flex:1 }}>Trailer</span>
            <span style={{ fontSize:16 }}>{form.tieneTrailer ? "✓ Sí" : "+ No"}</span>
          </button>
          {form.tieneTrailer && (
            <div style={{ marginTop:10, background:"#111", borderRadius:12, padding:14, border:"1px solid #f9731633" }}>
              <div style={{ color:"#f97316", fontSize:12, fontWeight:700, textTransform:"uppercase", marginBottom:10 }}>Control del trailer</div>
              <div style={{ display:"flex", flexDirection:"column", gap:8 }}>
                {TRAILER_CHECK_ITEMS.map(item => {
                  const estado = (form.trailerCheck||{})[item.id] || null;
                  return (
                    <div key={item.id} style={{ display:"flex", alignItems:"center", gap:8, flexWrap:"wrap" }}>
                      <span style={{ color:"#9ca3af", fontSize:13, minWidth:130 }}>{item.label}</span>
                      <div style={{ display:"flex", gap:4, flexWrap:"wrap" }}>
                        {ESTADOS.map(est => (
                          <button key={est.id} onClick={() => set("trailerCheck", {...(form.trailerCheck||{}), [item.id]: estado === est.id ? null : est.id })}
                            style={{ padding:"4px 8px", borderRadius:8, fontSize:11, fontWeight:700, cursor:"pointer", border:`1px solid ${estado===est.id ? est.color : "#333"}`, background: estado===est.id ? est.bg : "transparent", color: estado===est.id ? est.color : "#4b5563" }}>
                            {est.label}
                          </button>
                        ))}
                      </div>
                    </div>
                  );
                })}
              </div>
            </div>
          )}
        </div>

        <div>
          <label style={{ color:"#9ca3af", fontSize:12, fontWeight:700, letterSpacing:"0.05em", textTransform:"uppercase", display:"block", marginBottom:8 }}>Notas (opcional)</label>
          <textarea value={form.notes} onChange={e => set("notes", e.target.value)} placeholder="Observaciones adicionales..." rows={3}
            style={{ width:"100%", padding:"12px 14px", borderRadius:10, background:"#0f0f0f", border:"1px solid #252525", color:"#e5e7eb", fontSize:14, outline:"none", resize:"none", boxShadow:"inset 0 1px 4px rgba(0,0,0,0.4)" }}/>
        </div>
        <button onClick={handleSave} style={{ width:"100%", padding:"16px", background:"linear-gradient(135deg,#f97316,#c2400c)", border:"none", color:"#fff", borderRadius:12, cursor:"pointer", fontWeight:800, fontSize:15, marginTop:8, letterSpacing:"0.06em", textTransform:"uppercase", boxShadow:"0 4px 20px rgba(249,115,22,0.35), inset 0 1px 0 rgba(255,255,255,0.1)" }}>
          Guardar Cliente
        </button>
      </div>
    </div>
  );
}

/* ─────────────── COMPANIES ─────────────── */
function Companies({ data, setPage, setSelectedCompany }) {
  const [search, setSearch] = useState("");
  const filtered = data.companies.filter(c =>
    (c.name||"").toLowerCase().includes(search.toLowerCase()) ||
    (c.cuit||"").includes(search)
  );
  return (
    <div style={{ padding:"14px 14px 100px", animation:"fadeSlideIn 0.2s ease" }}>
      <h2 style={{ fontFamily:"'Barlow Condensed',sans-serif", color:"#60a5fa", margin:"0 0 16px", fontSize:26, fontWeight:900, letterSpacing:"0.03em", textTransform:"uppercase" }}>Empresas</h2>
      <input value={search} onChange={e => setSearch(e.target.value)} placeholder="Buscar empresa o CUIT..."
        style={{ width:"100%", padding:"12px 16px", borderRadius:12, background:"#111", border:"1px solid #2a2a2a", color:"#e5e7eb", fontSize:14, marginBottom:16, outline:"none", boxShadow:"inset 0 1px 3px rgba(0,0,0,0.3)" }}/>
      {filtered.length === 0 && <div style={{ textAlign:"center", color:"#2d3340", padding:"48px 0" }}><div style={{ fontSize:44, marginBottom:12, opacity:0.6 }}>🏢</div><div style={{ fontSize:13, letterSpacing:"0.04em" }}>No hay empresas todavía</div></div>}
      {filtered.map(c => {
        const vehicleCount = (c.vehicles || []).length;
        return (
          <div key={c.id} onClick={() => { setSelectedCompany(c); setPage("company-detail"); }}
            style={{ background:"linear-gradient(145deg,#1a1a1a,#151515)", borderRadius:16, padding:"14px 16px", border:"1px solid #252525", cursor:"pointer", display:"flex", alignItems:"center", gap:12, marginBottom:10, boxShadow:"0 2px 12px rgba(0,0,0,0.3)", transition:"border-color 0.2s" }}>
            <div style={{ width:44, height:44, borderRadius:12, background:"rgba(96,165,250,0.08)", border:"1px solid rgba(96,165,250,0.22)", display:"flex", alignItems:"center", justifyContent:"center", fontSize:22, flexShrink:0, boxShadow:"0 0 12px rgba(96,165,250,0.1)" }}>🏢</div>
            <div style={{ flex:1, minWidth:0 }}>
              <div style={{ color:"#f1f5f9", fontWeight:700, fontSize:15, marginBottom:2 }}>{c.name}</div>
              {c.cuit && <div style={{ color:"#6b7280", fontSize:12 }}>CUIT: {c.cuit}</div>}
              {c.phone && <div style={{ color:"#6b7280", fontSize:12 }}>📱 {c.phone}</div>}
            </div>
            <div style={{ textAlign:"right", flexShrink:0 }}>

function NewCompany({ setPage }) {

  async function handleSave() {
    if (!form.name) { alert("Ingresá el nombre de la empresa."); return; }
    await fbAdd("companies", { ...form, vehicles: [], createdAt: Date.now() });
    setSaved(true);
    setTimeout(() => { setSaved(false); setPage("companies"); }, 1200);

  if (saved) return (

    <div style={{ padding:"14px 14px 100px", animation:"fadeSlideIn 0.2s ease" }}>

      <div style={{ display:"flex", flexDirection:"column", gap:14 }}>
        {[["Nombre de la empresa *", "name", "Transportes García S.A.", "text"],
          ["Teléfono", "phone", "11-2345-6789", "tel"],
          ["CUIT", "cuit", "20-12345678-9", "text"],
          ["Dirección", "address", "Av. Corrientes 1234", "text"]].map(([label, key, ph, type]) => (

            <input type={type} value={form[key]} onChange={e => set(key, e.target.value)} placeholder={ph}

          </div>
        ))}
        <div>
          <label style={{ color:"#9ca3af", fontSize:12, fontWeight:700, letterSpacing:"0.05em", textTransform:"uppercase", display:"block", marginBottom:8 }}>Notas (opcional)</label>
          <textarea value={form.notes} onChange={e => set("notes", e.target.value)} placeholder="Observaciones sobre la empresa..." rows={3}
            style={{ width:"100%", padding:"12px 14px", borderRadius:10, background:"#0f0f0f", border:"1px solid #252525", color:"#e5e7eb", fontSize:14, outline:"none", resize:"none", boxShadow:"inset 0 1px 4px rgba(0,0,0,0.4)" }}/>
        </div>
        <button onClick={handleSave} style={{ width:"100%", padding:"16px", background:"linear-gradient(135deg,#3b82f6,#2563eb)", border:"none", color:"#fff", borderRadius:14, cursor:"pointer", fontWeight:900, fontSize:16, marginTop:8 }}>
          Guardar Empresa
        </button>
      </div>
    </div>
  );
}

/* ─────────────── COMPANY DETAIL ─────────────── */
function CompanyDetail({ company, data, setPage, setSelectedCompany, setSelectedVehicle, setSelectedMaquina }) {
  const [showAddVehicle, setShowAddVehicle] = useState(false);
  const [vForm, setVForm] = useState({ plate:"", vehicle:"", nroMovil:"", notes:"", tieneTrailer:false, trailerCheck:{} });
  const [saving, setSaving] = useState(false);
  const [editingVehicle, setEditingVehicle] = useState(null); // vehículo que se está editando
  const [eForm, setEForm] = useState(null); // formulario de edición

  const vehicles = company.vehicles || [];

  function startEdit(v) {
    setEditingVehicle(v.id);
    setEForm({ plate: v.plate, vehicle: v.vehicle, nroMovil: v.nroMovil||"", notes: v.notes||"", tieneTrailer: v.tieneTrailer||false, trailerCheck: v.trailerCheck||{} });
  }

  async function saveEdit(vehicleId) {
    setSaving(true);
    const updatedVehicles = vehicles.map(v => v.id === vehicleId ? { ...v, ...eForm, plate: eForm.plate.toUpperCase() } : v);
    await fbUpdate("companies", company.id, { vehicles: updatedVehicles });
    setSelectedCompany({ ...company, vehicles: updatedVehicles });
    setEditingVehicle(null);
    setEForm(null);
    setSaving(false);
  }

  async function addVehicle() {
    if (!vForm.plate || !vForm.vehicle) { alert("Ingresá dominio y tipo de vehículo."); return; }
    setSaving(true);
    const newVehicle = { ...vForm, id: Date.now().toString(), plate: vForm.plate.toUpperCase(), createdAt: Date.now() };
    const updatedVehicles = [...vehicles, newVehicle];
    await fbUpdate("companies", company.id, { vehicles: updatedVehicles });
    setSelectedCompany({ ...company, vehicles: updatedVehicles });
    setVForm({ plate:"", vehicle:"", nroMovil:"", notes:"", tieneTrailer:false, trailerCheck:{} });
    setShowAddVehicle(false);
    setSaving(false);
  }

  async function deleteVehicle(vehicleId) {
    if (!confirm("¿Eliminar este vehículo?")) return;
    const updatedVehicles = vehicles.filter(v => v.id !== vehicleId);
    await fbUpdate("companies", company.id, { vehicles: updatedVehicles });
    setSelectedCompany({ ...company, vehicles: updatedVehicles });
  }

  async function deleteCompany() {
    if (!confirm(`¿Eliminar la empresa ${company.name}? Se eliminarán todos sus chequeos.`)) return;
    // Eliminar chequeos de vehículos de esta empresa
    const compChecks = data.checks.filter(ch => vehicles.some(v => v.id === ch.vehicleId));
    for (const ch of compChecks) await fbDelete("checks", ch.id);
    await fbDelete("companies", company.id);
    setPage("companies");
  }

  const companyChecks = data.checks.filter(ch => vehicles.some(v => v.id === ch.vehicleId));

  return (
    <div style={{ padding:"14px 14px 100px", animation:"fadeSlideIn 0.2s ease" }}>
      <button onClick={() => setPage("companies")} style={{ background:"none", border:"none", color:"#3b5bdb", cursor:"pointer", fontSize:13, fontWeight:700, marginBottom:16, padding:"6px 0", letterSpacing:"0.04em", display:"flex", alignItems:"center", gap:6 }}>← Volver</button>

      {/* Header empresa */}
      <div style={{ background:"linear-gradient(145deg,#1c1c1c,#141414)", borderRadius:18, padding:20, border:"1px solid rgba(96,165,250,0.2)", marginBottom:16, boxShadow:"0 4px 24px rgba(0,0,0,0.4), inset 0 1px 0 rgba(96,165,250,0.04)" }}>
        <div style={{ display:"flex", alignItems:"center", gap:14, marginBottom:16 }}>
          <div style={{ width:56, height:56, borderRadius:16, background:"#60a5fa22", border:"2px solid #60a5fa", display:"flex", alignItems:"center", justifyContent:"center", fontSize:28 }}>🏢</div>
          <div>
            <h2 style={{ color:"#f1f5f9", margin:0, fontSize:20, fontWeight:900 }}>{company.name}</h2>
            <span style={{ color:"#60a5fa", fontSize:12, fontWeight:700 }}>{vehicles.length} vehículos registrados</span>
          </div>
        </div>
        {[company.phone && ["Teléfono", company.phone], company.cuit && ["CUIT", company.cuit], company.address && ["Dirección", company.address], company.notes && ["Notas", company.notes]].filter(Boolean).map(([l,v]) => (
          <div key={l} style={{ display:"flex", justifyContent:"space-between", gap:8, marginBottom:8 }}>
            <span style={{ color:"#6b7280", fontSize:13 }}>{l}</span>
            <span style={{ color:"#e5e7eb", fontSize:13, fontWeight:600, textAlign:"right" }}>{v}</span>
          </div>
        ))}
        <div style={{ display:"flex", gap:8, marginTop:12 }}>
          <div style={{ flex:1, background:"rgba(16,185,129,0.07)", border:"1px solid rgba(16,185,129,0.2)", borderRadius:10, padding:"8px 12px", textAlign:"center" }}>
            <div style={{ color:"#10b981", fontWeight:900, fontSize:18 }}>{vehicles.length}</div>
            <div style={{ color:"#6b7280", fontSize:10 }}>Vehículos</div>
          </div>
          <div style={{ flex:1, background:"rgba(249,115,22,0.07)", border:"1px solid rgba(249,115,22,0.2)", borderRadius:10, padding:"8px 12px", textAlign:"center" }}>
            <div style={{ color:"#f97316", fontWeight:900, fontSize:18 }}>{companyChecks.length}</div>
            <div style={{ color:"#6b7280", fontSize:10 }}>Chequeos</div>

        </div>
      </div>

      {/* Lista de vehículos */}
      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:12 }}>

function VehicleDetail({ vehicle, data, setPage }) {

  const [viewingCheck, setViewingCheck] = useState(null);

  // Reparaciones guardadas en el objeto vehículo dentro de la empresa
  const company = data.companies.find(c => c.id === vehicle.companyId);
  const repairs = (() => {
    if (!company) return vehicle.repairs || [];
    const v = (company.vehicles||[]).find(v => v.id === vehicle.id);
    return v ? (v.repairs || []) : (vehicle.repairs || []);
  })();

  async function addRepair(repData) {
    if (!company) return;
    const updatedVehicles = (company.vehicles||[]).map(v =>
      v.id === vehicle.id ? { ...v, repairs: [...(v.repairs||[]), repData] } : v
    );
    await fbUpdate("companies", company.id, { vehicles: updatedVehicles });
    setShowRepairForm(false);
  }

  async function deleteRepair(idx) {
    if (!company) return;
    const updatedVehicles = (company.vehicles||[]).map(v => {
      if (v.id !== vehicle.id) return v;
      const reps = (v.repairs||[]).filter((_, i) => i !== idx);
      return { ...v, repairs: reps };
    });
    await fbUpdate("companies", company.id, { vehicles: updatedVehicles });

  async function toggleRepairEstado(idx, newEstado) {
    if (!company) return;

      if (v.id !== vehicle.id) return v;
      const reps = (v.repairs||[]).map((r, i) => i === idx ? { ...r, estado: newEstado } : r);
      return { ...v, repairs: reps };

      `🏢 Empresa: ${vehicle.companyName}\n🚛 Vehículo: ${vehicle.vehicle}\n🔖 Dominio: ${vehicle.plate}\n` +

/* ─────────────── TRAILER HISTORIAL ─────────────── */
function exportarPDFTrailer(entry) {
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({ orientation:"portrait", unit:"mm", format:"a4" });
  const W = 210, M = 14;
  let y = 14;
  doc.setDrawColor(249,115,22); doc.setLineWidth(0.8);
  doc.line(M, y+10, W-M, y+10);
  doc.setFontSize(20); doc.setFont("helvetica","bold"); doc.setTextColor(249,115,22);
  doc.text("ASN", M, y+7);
  doc.setFontSize(9); doc.setFont("helvetica","normal"); doc.setTextColor(107,114,128);
  doc.text("Control y Prevenci\xF3n Vehicular", M+16, y+4);
  doc.setFontSize(8); doc.setTextColor(55,65,81); doc.text("Informe de Trailer", M+16, y+8.5);
  doc.setFontSize(8); doc.setTextColor(107,114,128);
  doc.text("Fecha: " + new Date(entry.fecha||entry.createdAt).toLocaleDateString("es-AR") + (entry.perito ? "   Perito: " + entry.perito : ""), W-M, y+4, { align:"right" });
  y += 16;
  const estadoColors = { ok:[16,185,129], critico:[239,68,68], prevencion:[245,158,11], solicitar:[96,165,250], no:[107,114,128] };
  const rows = TRAILER_CHECK_ITEMS.map(function(item) {
    const e = (entry.estados||{})[item.id];
    const est = ESTADOS.find(function(x) { return x.id === e; });
    return [item.label, est ? est.label : "\u2014", e || ""];
  });
  doc.autoTable({
    startY: y, head:[["🚐  Ítems del Trailer", "Estado"]], body: rows.map(function(r) { return [r[0], r[1]]; }),
    theme:"striped", styles:{ fontSize:8, cellPadding:2, textColor:[55,65,81], fillColor:[255,255,255] },
    headStyles:{ fillColor:[243,244,246], textColor:[55,65,81], fontStyle:"bold", fontSize:8 },
    columnStyles:{ 0:{ cellWidth:"auto" }, 1:{ cellWidth:26, halign:"right" } },
    margin:{ left:M, right:M },
    didParseCell: function(data) {
      if (data.column.index === 1 && data.section === "body") {
        const col = estadoColors[rows[data.row.index] && rows[data.row.index][2]] || [107,114,128];
        data.cell.styles.textColor = col; data.cell.styles.fontStyle = "bold";
      }
    },
  });
  y = doc.lastAutoTable.finalY + 6;
  if (entry.observaciones) {
    const lines = doc.splitTextToSize(entry.observaciones, W-M*2-6);
    doc.setFillColor(255,251,235); doc.setDrawColor(252,211,77); doc.setLineWidth(0.3);
    doc.roundedRect(M, y, W-M*2, lines.length*4+10, 2, 2, "FD");
    doc.setFontSize(8); doc.setFont("helvetica","bold"); doc.setTextColor(146,64,14);
    doc.text("Observaciones", M+3, y+5);
    doc.setFont("helvetica","normal"); doc.setTextColor(92,64,14);
    doc.text(lines, M+3, y+10);
  }
  const pageH = doc.internal.pageSize.getHeight();
  doc.setDrawColor(249,115,22); doc.setLineWidth(0.5);
  doc.line(M, pageH-12, W-M, pageH-12);
  doc.setFontSize(7); doc.setFont("helvetica","normal"); doc.setTextColor(107,114,128);
  doc.text("ASN \xB7 Control y Prevenci\xF3n Vehicular", M, pageH-7);
  doc.text("Generado: " + new Date().toLocaleDateString("es-AR"), W-M, pageH-7, { align:"right" });
  doc.save("ASN_Trailer_" + new Date(entry.fecha||entry.createdAt).toLocaleDateString("es-AR").replace(/\//g,"-") + ".pdf");
}

function generarWppTrailer(entry) {
  const crit2 = TRAILER_CHECK_ITEMS.filter(i => (entry.estados||{})[i.id] === "critico").map(i => i.label);
  const prev2 = TRAILER_CHECK_ITEMS.filter(i => (entry.estados||{})[i.id] === "prevencion").map(i => i.label);
  const ok2 = TRAILER_CHECK_ITEMS.filter(i => (entry.estados||{})[i.id] === "ok").length;
  let msg = "🚐 *INFORME DE TRAILER*\n*ASN · Control y Prevención Vehicular*\n━━━━━━━━━━━━━━━━━━━━\n\n";
  msg += "📅 *Fecha:* " + new Date(entry.fecha||entry.createdAt).toLocaleDateString("es-AR") + "\n";
  if (entry.perito) msg += "👷 *Perito:* " + entry.perito + "\n";
  msg += "\n━━━━━━━━━━━━━━━━━━━━\n✅ Ítems OK: *" + ok2 + "/" + TRAILER_CHECK_ITEMS.length + "*\n━━━━━━━━━━━━━━━━━━━━\n\n";
  if (crit2.length > 0) { msg += "🔴 *CRÍTICO:*\n"; crit2.forEach(function(i) { msg += "  • " + i + "\n"; }); msg += "\n"; }
  if (prev2.length > 0) { msg += "🟡 *PREVENCIÓN:*\n"; prev2.forEach(function(i) { msg += "  • " + i + "\n"; }); msg += "\n"; }
  if (entry.observaciones) msg += "📝 *Observaciones:*\n" + entry.observaciones + "\n\n";
  msg += "━━━━━━━━━━━━━━━━━━━━\n_ASN · Control y Prevención Vehicular_";
  return msg;
}

function TrailerHistorial({ entity, tipo, onSave, onAddHistorial, onDeleteHistorial }) {
  const trailerCheck = entity.trailerCheck || {};
  const historial = entity.trailerHistorial || [];
  const [editMode, setEditMode] = useState(false);
  const [draft, setDraft] = useState({...trailerCheck});
  const [showForm, setShowForm] = useState(false);
  const [saving, setSaving] = useState(false);
  const [entryForm, setEntryForm] = useState({
    fecha: new Date().toISOString().slice(0,10),
    perito: "",
    observaciones: "",
    estados: {...trailerCheck},
  });

  const INP2 = { width:"100%", padding:"10px 14px", borderRadius:10, background:"#111", border:"1px solid #333", color:"#e5e7eb", fontSize:14, outline:"none" };

  // Calcular salud del trailer
  const criticos  = TRAILER_CHECK_ITEMS.filter(i => trailerCheck[i.id] === "critico").length;
  const ok        = TRAILER_CHECK_ITEMS.filter(i => trailerCheck[i.id] === "ok").length;
  const pct       = Math.round((ok / TRAILER_CHECK_ITEMS.length) * 100);
  const healthColor = criticos > 0 ? "#ef4444" : pct >= 80 ? "#10b981" : "#f59e0b";

  async function saveEdit() {
    setSaving(true);
    await onSave(draft);
    setEditMode(false);
    setSaving(false);
  }

  async function saveEntry() {
    if (!entryForm.perito) { alert("Ingresá el nombre del perito"); return; }
    setSaving(true);
    await onSave(entryForm.estados);
    await onAddHistorial({
      fecha: new Date(entryForm.fecha).getTime() || Date.now(),

            </div>

      )}
    </div>
  );
}
