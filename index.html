const REPAIR_CATS = [
  { id:"motor",      label:"Motor",           icon:"🔩" },
  { id:"frenos",     label:"Frenos",          icon:"🛑" },
  { id:"suspension", label:"Suspensión",      icon:"🔧" },
  { id:"electrico",  label:"Eléctrico",       icon:"⚡" },
  { id:"neumaticos", label:"Neumáticos",      icon:"🔄" },
  { id:"carroceria", label:"Carrocería",      icon:"🚗" },
  { id:"service",    label:"Service",         icon:"⚙️" },
  { id:"otro",       label:"Otro",            icon:"📋" },
];

function formatMoney(n) {
  if (!n && n !== 0) return "—";
  return "$" + Number(n).toLocaleString("es-AR");
}

function RepairStats({ repairs }) {
  if (!repairs || repairs.length === 0) return null;
  const total = repairs.reduce((a, r) => a + (Number(r.costo) || 0), 0);
  const sorted = [...repairs].sort((a, b) => b.createdAt - a.createdAt);
  const lastYear = Date.now() - 365 * 24 * 3600 * 1000;
  const totalAnio = repairs.filter(r => r.createdAt > lastYear).reduce((a, r) => a + (Number(r.costo) || 0), 0);
  // Por categoría
  const byCat = REPAIR_CATS.map(cat => ({
    ...cat,
    count: repairs.filter(r => r.categoria === cat.id).length,
    total: repairs.filter(r => r.categoria === cat.id).reduce((a, r) => a + (Number(r.costo) || 0), 0),
  })).filter(c => c.count > 0).sort((a, b) => b.total - a.total);

  // Análisis conveniencia
  let alerta = null;
  if (repairs.length >= 3 && totalAnio > 0) {
    if (totalAnio > 500000) alerta = { color:"#ef4444", bg:"#ef444422", border:"#ef444444", icon:"🔴", msg:`Gasto anual ${formatMoney(totalAnio)} — Alto costo de mantenimiento. Evaluar conveniencia del vehículo.` };
    else if (totalAnio > 200000) alerta = { color:"#f59e0b", bg:"#f59e0b22", border:"#f59e0b44", icon:"🟡", msg:`Gasto anual ${formatMoney(totalAnio)} — Costo moderado. Seguimiento recomendado.` };
    else alerta = { color:"#10b981", bg:"#10b98122", border:"#10b98144", icon:"🟢", msg:`Gasto anual ${formatMoney(totalAnio)} — Costo bajo. Vehículo en buen estado económico.` };
  }

  return (
    <div style={{ background:"linear-gradient(145deg,#1b1b1b,#141414)", borderRadius:16, padding:16, border:"1px solid #222", marginBottom:14, boxShadow:"0 2px 12px rgba(0,0,0,0.3)" }}>
      <h3 style={{ color:"#e5e7eb", fontSize:13, fontWeight:700, letterSpacing:"0.05em", textTransform:"uppercase", margin:"0 0 14px" }}>📊 Estadísticas de Reparaciones</h3>
      {/* Badges de estado */}
      {(() => {
        const pendientes   = repairs.filter(r => !r.estado || r.estado === "pendiente").length;
        const realizadas   = repairs.filter(r => r.estado === "realizada").length;
        const noRealizadas = repairs.filter(r => r.estado === "no_realizada").length;
        return pendientes + realizadas + noRealizadas > 0 ? (
          <div style={{ display:"flex", gap:6, marginBottom:12, flexWrap:"wrap" }}>
            {pendientes > 0 && <span style={{ fontSize:11, fontWeight:700, padding:"4px 10px", borderRadius:20, background:"#f59e0b22", color:"#f59e0b", border:"1px solid #f59e0b55" }}>⏳ {pendientes} pendiente{pendientes>1?"s":""}</span>}
            {realizadas > 0 && <span style={{ fontSize:11, fontWeight:700, padding:"4px 10px", borderRadius:20, background:"#10b98122", color:"#10b981", border:"1px solid #10b98155" }}>✅ {realizadas} realizada{realizadas>1?"s":""}</span>}
            {noRealizadas > 0 && <span style={{ fontSize:11, fontWeight:700, padding:"4px 10px", borderRadius:20, background:"#ef444422", color:"#ef4444", border:"1px solid #ef444455" }}>❌ {noRealizadas} no realizada{noRealizadas>1?"s":""}</span>}
          </div>
        ) : null;
      })()}
      <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr 1fr", gap:8, marginBottom:14 }}>
        <div style={{ background:"#0f0f0f", borderRadius:12, padding:"10px 8px", textAlign:"center", border:"1px solid #1e1e1e" }}>
          <div style={{ color:"#a78bfa", fontWeight:900, fontSize:20 }}>{repairs.length}</div>
          <div style={{ color:"#6b7280", fontSize:10, textTransform:"uppercase" }}>Trabajos</div>
        </div>
        <div style={{ background:"#0f0f0f", borderRadius:12, padding:"10px 8px", textAlign:"center", border:"1px solid #1e1e1e" }}>
          <div style={{ color:"#f97316", fontWeight:900, fontSize:16 }}>{formatMoney(total)}</div>
          <div style={{ color:"#6b7280", fontSize:10, textTransform:"uppercase" }}>Total hist.</div>
        </div>
        <div style={{ background:"#0f0f0f", borderRadius:12, padding:"10px 8px", textAlign:"center", border:"1px solid #1e1e1e" }}>
          <div style={{ color:"#60a5fa", fontWeight:900, fontSize:16 }}>{formatMoney(totalAnio)}</div>
          <div style={{ color:"#6b7280", fontSize:10, textTransform:"uppercase" }}>Último año</div>
        </div>
      </div>
      {alerta && (
        <div style={{ background:alerta.bg, border:`1px solid ${alerta.border}`, borderRadius:10, padding:"10px 12px", marginBottom:12, color:alerta.color, fontSize:12, fontWeight:600 }}>
          {alerta.icon} {alerta.msg}
        </div>
      )}
      {byCat.length > 0 && (
        <div>
          <div style={{ color:"#6b7280", fontSize:11, fontWeight:700, textTransform:"uppercase", marginBottom:8 }}>Por categoría</div>
          {byCat.map(cat => (
            <div key={cat.id} style={{ display:"flex", alignItems:"center", gap:8, marginBottom:6 }}>
              <span style={{ fontSize:14 }}>{cat.icon}</span>
              <span style={{ color:"#9ca3af", fontSize:12, flex:1 }}>{cat.label}</span>
              <span style={{ color:"#6b7280", fontSize:11 }}>{cat.count}x</span>
              <span style={{ color:"#e5e7eb", fontSize:12, fontWeight:700, minWidth:80, textAlign:"right" }}>{formatMoney(cat.total)}</span>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

function RepairList({ repairs, onDelete, onShare, onToggleEstado }) {
  if (!repairs || repairs.length === 0) return (
    <div style={{ textAlign:"center", color:"#4b5563", padding:"20px 0", fontSize:13 }}>Sin reparaciones registradas</div>
  );
  return [...repairs].sort((a,b) => b.createdAt - a.createdAt).map((r, idx) => {
    const cat = REPAIR_CATS.find(c => c.id === r.categoria) || REPAIR_CATS[REPAIR_CATS.length-1];
    const est = REPAIR_ESTADOS.find(e => e.id === (r.estado||"pendiente")) || REPAIR_ESTADOS[0];
    // Encontrar índice original sin sort para el callback
    const origIdx = repairs.indexOf(r);
    return (
      <div key={idx} style={{ background:"#111", borderRadius:12, padding:"12px 14px", border:`1px solid ${est.border}`, marginBottom:8 }}>
        <div style={{ display:"flex", alignItems:"flex-start", gap:10 }}>
          <span style={{ fontSize:20, flexShrink:0 }}>{cat.icon}</span>
          <div style={{ flex:1, minWidth:0 }}>
            <div style={{ display:"flex", alignItems:"center", gap:8, marginBottom:4, flexWrap:"wrap" }}>
              <span style={{ color:"#f1f5f9", fontWeight:700, fontSize:13 }}>{r.descripcion}</span>
              <span style={{ fontSize:10, fontWeight:700, padding:"2px 8px", borderRadius:20, background:est.bg, color:est.color, border:`1px solid ${est.border}`, whiteSpace:"nowrap" }}>
                {est.icon} {est.label}
              </span>
            </div>
            <div style={{ color:"#6b7280", fontSize:11 }}>
              {new Date(r.createdAt).toLocaleDateString("es-AR")}
              {r.taller ? ` · ${r.taller}` : ""}
              {" · "}<span style={{ color:"#a78bfa", fontSize:11 }}>{cat.label}</span>
            </div>
            {r.notas && <div style={{ color:"#4b5563", fontSize:11, marginTop:3 }}>{r.notas}</div>}
          </div>
          <div style={{ textAlign:"right", flexShrink:0 }}>
            {r.costo > 0 && <div style={{ color:"#f97316", fontWeight:900, fontSize:14 }}>{formatMoney(r.costo)}</div>}
          </div>
        </div>
        {/* Botones de cambio de estado */}
        {onToggleEstado && (
          <div style={{ display:"flex", gap:5, marginTop:10, marginBottom:4 }}>
            {REPAIR_ESTADOS.map(e => (
              <button key={e.id} onClick={() => onToggleEstado(origIdx, e.id)}
                style={{ flex:1, padding:"6px 4px", borderRadius:8, cursor:"pointer",
                  border:`2px solid ${(r.estado||"pendiente")===e.id ? e.color : "#2a2a2a"}`,
                  background:(r.estado||"pendiente")===e.id ? e.bg : "transparent",
                  color:(r.estado||"pendiente")===e.id ? e.color : "#4b5563",
                  fontWeight:700, fontSize:10, display:"flex", alignItems:"center", justifyContent:"center", gap:3 }}>
                {e.icon} {e.label}
              </button>
            ))}
          </div>
        )}
        <div style={{ display:"flex", gap:6, marginTop:6 }}>
          {onShare && <button onClick={() => onShare(r)} style={{ flex:1, padding:"7px 8px", borderRadius:8, background:"#25d36622", border:"1px solid #25d36644", color:"#25d366", fontWeight:700, fontSize:11, cursor:"pointer" }}>💬 Compartir</button>}
          <button onClick={() => { if (confirm("¿Eliminar esta reparación?")) onDelete(origIdx); }}
            style={{ padding:"7px 10px", borderRadius:8, background:"transparent", border:"1px solid #ef444433", color:"#ef4444", fontWeight:700, fontSize:11, cursor:"pointer" }}>🗑️</button>
        </div>
      </div>
    );
  });
}

/* ─────────────── TRAILER CHECK ITEM ROW ─────────────── */
function TrailerCheckItemRow({ item, estado, onSetEstado }) {
  const [isOpen, setIsOpen] = useState(false);
  const est = ESTADOS.find(e => e.id === estado);
  return (
    <div>
      <div onClick={() => setIsOpen(o => !o)}
        style={{ display:"flex", alignItems:"center", gap:10, padding:"10px 4px", cursor:"pointer", borderBottom:"1px solid #232323" }}>
        <span style={{ flex:1, color: estado ? "#e5e7eb" : "#9ca3af", fontSize:13 }}>{item.label}</span>
        {est
          ? <span style={{ fontSize:11, fontWeight:700, padding:"3px 10px", borderRadius:20, background:est.bg, color:est.color, border:`1px solid ${est.color}55`, whiteSpace:"nowrap" }}>{est.label}</span>
          : <span style={{ color:"#3a3a3a", fontSize:11 }}>— tocar —</span>
        }
      </div>
      {isOpen && (
        <div style={{ display:"flex", flexWrap:"wrap", gap:6, padding:"8px 0 12px", borderBottom:"1px solid #232323" }}>
          {ESTADOS.map(e => (
            <button key={e.id} onClick={() => { onSetEstado(estado === e.id ? null : e.id); setIsOpen(false); }}
              style={{ padding:"6px 14px", borderRadius:20, border:`2px solid ${e.color}`, background: estado===e.id ? e.bg : "transparent", color:e.color, fontWeight:700, fontSize:12, cursor:"pointer" }}>{e.label}</button>
          ))}
          {estado && <button onClick={() => { onSetEstado(null); setIsOpen(false); }}
            style={{ padding:"6px 14px", borderRadius:20, border:"2px solid #374151", background:"transparent", color:"#6b7280", fontWeight:700, fontSize:12, cursor:"pointer" }}>Limpiar</button>}
        </div>
      )}
    </div>
  );
}

/* ─────────────── CHECKS ─────────────── */
const ST  = { color:"#e5e7eb", margin:"0 0 12px", fontSize:13, fontWeight:700, letterSpacing:"0.05em", textTransform:"uppercase" };
const INP = { width:"100%", padding:"10px 14px", borderRadius:10, background:"#111", border:"1px solid #333", color:"#e5e7eb", fontSize:14, outline:"none" };
const TXA = { width:"100%", padding:"10px 14px", borderRadius:10, background:"#111", border:"1px solid #333", color:"#e5e7eb", fontSize:14, outline:"none", resize:"none" };
const SEL = (v) => ({ width:"100%", padding:"10px 14px", borderRadius:10, background:"#111", border:"1px solid #333", color: v ? "#e5e7eb" : "#6b7280", fontSize:14, outline:"none" });

function Checks({ data, setPage, preselectedClientId }) {
  const [mode, setMode] = useState("client"); // "client" | "company"
  const [clientId, setClientId] = useState(preselectedClientId || "");
  const [companyId, setCompanyId] = useState("");
  const [vehicleId, setVehicleId] = useState("");
  const [perito, setPerito] = useState("");
  const [kms, setKms] = useState("");
  const [nroMovil, setNroMovil] = useState("");
  const [itemStates, setItemStates] = useState(buildInitialItems);
  const [trailerItemStates, setTrailerItemStates] = useState({});
  const [detalle, setDetalle] = useState("");
  const [recomendaciones, setRecomendaciones] = useState("");
  const [saved, setSaved] = useState(false);
  const [activeItem, setActiveItem] = useState(null);
  const [milestoneStats, setMilestoneStats] = useState(null);
  const prevDoneRef = useRef(0);

  function setEstado(itemId, estadoId) {
    setItemStates(p => {
      const next = { ...p, [itemId]: estadoId };
      const allItems = CHECK_SECTIONS.flatMap(s => s.items);
      const done = allItems.filter(i => next[i.id] !== null).length;
      const prevDone = prevDoneRef.current;
      if (done > 0 && Math.floor(done / 3) > Math.floor(prevDone / 3)) {
        const ok = allItems.filter(i => next[i.id] === "ok").length;
        const critico = allItems.filter(i => next[i.id] === "critico").length;
        const prevencion = allItems.filter(i => next[i.id] === "prevencion").length;
        const solicitar = allItems.filter(i => next[i.id] === "solicitar").length;
        const pct = Math.round((ok / done) * 100);
        setMilestoneStats({ done, total: allItems.length, ok, critico, prevencion, solicitar, pct });
      }
      prevDoneRef.current = done;
      return next;
    });
    setActiveItem(null);
  }

  const selectedCompany = data.companies.find(c => c.id === companyId);
  const companyVehicles = selectedCompany ? (selectedCompany.vehicles || []) : [];

  async function handleSave() {
    if (mode === "client" && !clientId) { alert("Seleccioná un cliente."); return; }
    if (mode === "company" && (!companyId || !vehicleId)) { alert("Seleccioná empresa y vehículo."); return; }

    // Determinar si hay trailer
    let selectedEntityForSave = null;
    if (mode === "client" && clientId) selectedEntityForSave = data.clients.find(c => c.id === clientId);
    else if (mode === "company" && vehicleId) {
      const comp = data.companies.find(c => c.id === companyId);
      selectedEntityForSave = comp ? (comp.vehicles||[]).find(v => v.id === vehicleId) : null;
    }
    const tieneTrailer = selectedEntityForSave?.tieneTrailer || false;

    const check = {
      clientId: mode === "client" ? clientId : null,
      vehicleId: mode === "company" ? vehicleId : null,
      companyId: mode === "company" ? companyId : null,
      perito, kms, nroMovil, itemStates, detalle, recomendaciones,
      trailerIncluido: tieneTrailer,
      trailerItemStates: tieneTrailer ? trailerItemStates : {},
      createdAt: Date.now()
    };
    await fbAdd("checks", check);
    setSaved(true);
    setItemStates(buildInitialItems()); setTrailerItemStates({}); setClientId(""); setCompanyId(""); setVehicleId(""); setPerito(""); setKms(""); setNroMovil(""); setDetalle(""); setRecomendaciones("");
    setTimeout(() => setSaved(false), 2000);
  }

  const allItems = CHECK_SECTIONS.flatMap(s => s.items);
  const doneItems = allItems.filter(i => itemStates[i.id] !== null).length;
  const okItems = allItems.filter(i => itemStates[i.id] === "ok").length;
  const criticoItems = allItems.filter(i => itemStates[i.id] === "critico").length;

  if (saved) return (
    <div style={{ display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", height:"80vh", gap:16, padding:24 }}>
      <div style={{ fontSize:64 }}>✅</div>
      <div style={{ color:"#10b981", fontWeight:900, fontSize:20 }}>Chequeo guardado</div>
      <button onClick={() => setPage(mode === "company" ? "company-detail" : "client-detail")}
        style={{ marginTop:8, padding:"12px 28px", borderRadius:12, background:"rgba(249,115,22,0.07)", border:"1px solid rgba(249,115,22,0.2)", color:"#f97316", fontWeight:700, fontSize:14, cursor:"pointer" }}>
        ← Volver
      </button>
      <button onClick={() => setPage("clients")}
        style={{ padding:"10px 20px", borderRadius:12, background:"transparent", border:"1px solid #333", color:"#6b7280", fontWeight:600, fontSize:13, cursor:"pointer" }}>
        Ver todos los clientes
      </button>
    </div>
  );

  return (
    <div style={{ padding:"14px 14px 100px", animation:"fadeSlideIn 0.2s ease" }}>
      {/* Milestone stats modal */}
      {milestoneStats && (
        <div style={{ position:"fixed", inset:0, zIndex:200, background:"#000000cc", display:"flex", alignItems:"center", justifyContent:"center", padding:24 }}
          onClick={() => setMilestoneStats(null)}>
          <div style={{ background:"#1a1a1a", borderRadius:24, padding:24, border:"1px solid #f9731644", width:"100%", maxWidth:340 }}
            onClick={e => e.stopPropagation()}>
            <div style={{ textAlign:"center", marginBottom:16 }}>
              <div style={{ fontSize:36, marginBottom:6 }}>📊</div>
              <div style={{ color:"#f97316", fontWeight:900, fontSize:16 }}>Estado parcial del vehículo</div>
              <div style={{ color:"#6b7280", fontSize:12, marginTop:4 }}>{milestoneStats.done} de {milestoneStats.total} ítems relevados</div>
            </div>
            {/* Barra de salud */}
            <div style={{ background:"#111", borderRadius:12, height:10, overflow:"hidden", marginBottom:16 }}>
              <div style={{ width:`${milestoneStats.pct}%`, height:"100%", borderRadius:12,
                background: milestoneStats.critico > 0 ? "#ef4444" : milestoneStats.pct >= 80 ? "#10b981" : "#f59e0b",
                transition:"width 0.4s" }}/>
            </div>
            <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:8, marginBottom:16 }}>
              <div style={{ background:"rgba(16,185,129,0.07)", border:"1px solid rgba(16,185,129,0.2)", borderRadius:12, padding:"10px", textAlign:"center" }}>
                <div style={{ color:"#10b981", fontWeight:900, fontSize:22 }}>{milestoneStats.ok}</div>
                <div style={{ color:"#6b7280", fontSize:11 }}>OK ✓</div>
              </div>
              <div style={{ background:"rgba(239,68,68,0.07)", border:"1px solid rgba(239,68,68,0.2)", borderRadius:12, padding:"10px", textAlign:"center" }}>
                <div style={{ color:"#ef4444", fontWeight:900, fontSize:22 }}>{milestoneStats.critico}</div>
                <div style={{ color:"#6b7280", fontSize:11 }}>Crítico ⚠️</div>
              </div>
              <div style={{ background:"rgba(245,158,11,0.07)", border:"1px solid rgba(245,158,11,0.2)", borderRadius:12, padding:"10px", textAlign:"center" }}>
                <div style={{ color:"#f59e0b", fontWeight:900, fontSize:22 }}>{milestoneStats.prevencion}</div>
                <div style={{ color:"#6b7280", fontSize:11 }}>Prevención</div>
              </div>
              <div style={{ background:"rgba(96,165,250,0.07)", border:"1px solid rgba(96,165,250,0.2)", borderRadius:12, padding:"10px", textAlign:"center" }}>
                <div style={{ color:"#60a5fa", fontWeight:900, fontSize:22 }}>{milestoneStats.solicitar}</div>
                <div style={{ color:"#6b7280", fontSize:11 }}>A Solicitar</div>
              </div>
            </div>
            <div style={{ background: milestoneStats.critico > 0 ? "#ef444422" : milestoneStats.pct >= 80 ? "#10b98122" : "#f59e0b22",
              border:`1px solid ${milestoneStats.critico > 0 ? "#ef444444" : milestoneStats.pct >= 80 ? "#10b98144" : "#f59e0b44"}`,
              borderRadius:12, padding:"10px 14px", textAlign:"center", marginBottom:16,
              color: milestoneStats.critico > 0 ? "#ef4444" : milestoneStats.pct >= 80 ? "#10b981" : "#f59e0b",
              fontWeight:700, fontSize:13 }}>
              {milestoneStats.critico > 0
                ? `⛔ Hay ${milestoneStats.critico} ítem${milestoneStats.critico > 1 ? "s" : ""} crítico${milestoneStats.critico > 1 ? "s" : ""} — requiere atención`
                : milestoneStats.pct >= 80
                  ? "✅ El vehículo marcha bien hasta acá"
                  : "🟡 Algunos ítems requieren atención"}
            </div>
            <button onClick={() => setMilestoneStats(null)}
              style={{ width:"100%", padding:"12px", background:"linear-gradient(135deg,#f97316,#ea580c)", border:"none", color:"#fff", borderRadius:12, cursor:"pointer", fontWeight:900, fontSize:15 }}>
              Continuar chequeo →
            </button>
          </div>
        </div>
      )}

      <button onClick={() => preselectedClientId ? setPage("client-detail") : setPage("dashboard")} style={{ background:"none", border:"none", color:"#c2400c", cursor:"pointer", fontSize:13, fontWeight:700, marginBottom:16, padding:"6px 0", letterSpacing:"0.04em" }}>← Volver</button>
      <h2 style={{ color:"#f97316", margin:"0 0 4px", fontSize:22, fontWeight:900 }}>Nuevo Chequeo</h2>
      <p style={{ color:"#6b7280", fontSize:13, margin:"0 0 20px" }}>Planilla ASN de Control Vehicular</p>

      {/* Selector cliente/empresa */}
      <div style={{ background:"linear-gradient(145deg,#1c1c1c,#161616)", borderRadius:16, padding:16, marginBottom:14, border:"1px solid #232323", boxShadow:"0 4px 16px rgba(0,0,0,0.3), inset 0 1px 0 rgba(255,255,255,0.02)" }}>
        <h3 style={ST}>Tipo de titular</h3>
        <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:8, marginBottom:14 }}>
          <button onClick={() => { setMode("client"); setCompanyId(""); setVehicleId(""); }}
            style={{ padding:"10px", borderRadius:10, cursor:"pointer", border:`2px solid ${mode==="client" ? "#f97316" : "#2a2a2a"}`, background: mode==="client" ? "#f9731622" : "#111", color: mode==="client" ? "#f97316" : "#6b7280", fontWeight:700, fontSize:13 }}>
            👤 Cliente particular
          </button>
          <button onClick={() => { setMode("company"); setClientId(""); }}
            style={{ padding:"10px", borderRadius:10, cursor:"pointer", border:`2px solid ${mode==="company" ? "#60a5fa" : "#2a2a2a"}`, background: mode==="company" ? "#60a5fa22" : "#111", color: mode==="company" ? "#60a5fa" : "#6b7280", fontWeight:700, fontSize:13 }}>
            🏢 Empresa
          </button>
        </div>

        {preselectedClientId && mode === "client" && (() => {
          const pre = data.clients.find(c => c.id === preselectedClientId);
          return pre ? (
            <div style={{ background:"rgba(249,115,22,0.07)", border:"1px solid rgba(249,115,22,0.2)", borderRadius:10, padding:"10px 14px", marginBottom:4, display:"flex", alignItems:"center", gap:10 }}>
              <span style={{ fontSize:18 }}>👤</span>
              <div style={{ flex:1 }}>
                <div style={{ color:"#f97316", fontWeight:700, fontSize:13 }}>{pre.name}</div>
                <div style={{ color:"#6b7280", fontSize:11 }}>{pre.vehicle} · {pre.plate}</div>
              </div>
              <span style={{ color:"#f97316", fontSize:11, fontWeight:700 }}>Preseleccionado</span>
            </div>
          ) : null;
        })()}
        <div style={{ display:"flex", flexDirection:"column", gap:10 }}>
          {mode === "client" ? (
            <select value={clientId} onChange={e => setClientId(e.target.value)} style={SEL(!!clientId)}>
              <option value="">Cliente / Dominio...</option>
              {data.clients.map(c => <option key={c.id} value={c.id}>{c.name||"Sin nombre"} — {c.plate||"—"}</option>)}
            </select>
          ) : (
            <>
              <select value={companyId} onChange={e => { setCompanyId(e.target.value); setVehicleId(""); }} style={SEL(!!companyId)}>
                <option value="">Seleccioná empresa...</option>
                {data.companies.map(c => <option key={c.id} value={c.id}>{c.name||"Sin nombre"}</option>)}
              </select>
              {companyId && companyVehicles.length === 0 && (
                <div style={{ background:"rgba(249,115,22,0.07)", border:"1px solid rgba(249,115,22,0.2)", borderRadius:10, padding:"12px 14px", color:"#f97316", fontSize:13, fontWeight:600 }}>
                  ⚠️ Esta empresa no tiene vehículos cargados. Andá a <strong>Empresas → [empresa] → Agregar vehículo</strong> primero.
                </div>
              )}
              {companyId && companyVehicles.length > 0 && (
                <select value={vehicleId} onChange={e => setVehicleId(e.target.value)} style={SEL(!!vehicleId)}>
                  <option value="">Seleccioná vehículo...</option>
                  {companyVehicles.map(v => <option key={v.id} value={v.id}>{v.plate} · {v.vehicle}{v.nroMovil ? ` (Móvil ${v.nroMovil})` : ""}</option>)}
                </select>
              )}
            </>
          )}

          <input value={perito} onChange={e => setPerito(e.target.value)} placeholder="Nombre del perito" style={INP}/>
          <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:10 }}>
            <input value={kms} onChange={e => setKms(e.target.value)} placeholder="KMs actuales" style={INP} type="number"/>
            <input value={nroMovil} onChange={e => setNroMovil(e.target.value)} placeholder="Nro. Móvil" style={INP}/>
          </div>
        </div>
      </div>

      {/* Barra de progreso */}
      <div style={{ background:"#1a1a1a", borderRadius:12, padding:"12px 16px", marginBottom:14, border:"1px solid #2a2a2a" }}>
        <div style={{ display:"flex", justifyContent:"space-between", marginBottom:8, fontSize:12 }}>
          <span style={{ color:"#9ca3af" }}>{doneItems}/{allItems.length} ítems completados</span>
          <span style={{ color: criticoItems > 0 ? "#ef4444" : "#10b981", fontWeight:700 }}>{criticoItems > 0 ? `${criticoItems} críticos ⚠️` : `${okItems} OK ✓`}</span>
        </div>
        <div style={{ width:"100%", height:6, background:"#2a2a2a", borderRadius:3, overflow:"hidden" }}>
          <div style={{ width:`${(doneItems/allItems.length)*100}%`, height:"100%", background: criticoItems > 0 ? "#ef4444" : "#f97316", borderRadius:3, transition:"width 0.3s" }}/>
        </div>
      </div>

      {/* Secciones de chequeo */}
      {CHECK_SECTIONS.map(sec => (
        <div key={sec.id} style={{ background:"#1a1a1a", borderRadius:16, padding:16, marginBottom:12, border:"1px solid #2a2a2a" }}>
          <h3 style={ST}>{sec.icon} {sec.title}</h3>
          {sec.items.map((item, idx) => {
            const estado = itemStates[item.id];
            const est = ESTADOS.find(e => e.id === estado);
            const isOpen = activeItem === item.id;
            return (
              <div key={item.id}>
                <div onClick={() => setActiveItem(isOpen ? null : item.id)}
                  style={{ display:"flex", alignItems:"center", gap:10, padding:"11px 4px", cursor:"pointer", borderBottom: idx < sec.items.length - 1 || isOpen ? "1px solid #232323" : "none" }}>
                  <span style={{ flex:1, color: estado ? "#e5e7eb" : "#9ca3af", fontSize:14 }}>{item.label}</span>
                  {est
                    ? <span style={{ fontSize:11, fontWeight:700, padding:"3px 10px", borderRadius:20, background:est.bg, color:est.color, border:`1px solid ${est.color}55`, whiteSpace:"nowrap" }}>{est.label}</span>
                    : <span style={{ color:"#3a3a3a", fontSize:11 }}>— tocar —</span>
                  }
                </div>
                {isOpen && (
                  <div style={{ display:"flex", flexWrap:"wrap", gap:6, padding:"8px 0 12px", borderBottom:"1px solid #232323" }}>
                    {ESTADOS.map(e => (
                      <button key={e.id} onClick={() => setEstado(item.id, e.id)} style={{ padding:"6px 14px", borderRadius:20, border:`2px solid ${e.color}`, background: estado===e.id ? e.bg : "transparent", color:e.color, fontWeight:700, fontSize:12, cursor:"pointer" }}>{e.label}</button>
                    ))}
                    {estado && <button onClick={() => { setItemStates(p => ({ ...p, [item.id]: null })); setActiveItem(null); }} style={{ padding:"6px 14px", borderRadius:20, border:"2px solid #374151", background:"transparent", color:"#6b7280", fontWeight:700, fontSize:12, cursor:"pointer" }}>Limpiar</button>}
                  </div>
                )}
              </div>
            );
          })}
        </div>
      ))}

      {/* Trailer del vehículo seleccionado */}
      {(() => {
        // Obtener la entidad seleccionada para ver su trailer
        let selectedEntity = null;
        if (mode === "client" && clientId) {
          selectedEntity = data.clients.find(c => c.id === clientId);
        } else if (mode === "company" && vehicleId) {
          const comp = data.companies.find(c => c.id === companyId);
          selectedEntity = comp ? (comp.vehicles||[]).find(v => v.id === vehicleId) : null;
        }
        if (!selectedEntity) return null;
        const tieneTrailer = selectedEntity.tieneTrailer;
        return (
          <div style={{ background:"#1a1a1a", borderRadius:16, padding:16, marginBottom:12, border:`1px solid ${tieneTrailer ? "#f9731644" : "#2a2a2a"}` }}>
            <h3 style={{ color: tieneTrailer ? "#f97316" : "#4b5563", margin:"0 0 10px", fontSize:13, fontWeight:700, letterSpacing:"0.05em", textTransform:"uppercase" }}>
              🚐 Control del Trailer
            </h3>
            {!tieneTrailer ? (
              <div style={{ color:"#6b7280", fontSize:13, fontStyle:"italic" }}>No posee trailer</div>
            ) : (
              <div style={{ display:"flex", flexDirection:"column", gap:8 }}>
                <div style={{ color:"#6b7280", fontSize:11, marginBottom:4 }}>Este vehículo tiene trailer — completá el estado de cada ítem:</div>
                {TRAILER_CHECK_ITEMS.map(item => (
                  <TrailerCheckItemRow
                    key={item.id}
                    item={item}
                    estado={trailerItemStates[item.id] || null}
                    onSetEstado={(val) => setTrailerItemStates(p => ({ ...p, [item.id]: val }))}
                  />
                ))}
              </div>
            )}
          </div>
        );
      })()}

      {/* Detalle y recomendaciones */}
      <div style={{ background:"#1a1a1a", borderRadius:16, padding:16, marginBottom:12, border:"1px solid #2a2a2a" }}>
        <h3 style={ST}>📝 Detalle</h3>
        <textarea value={detalle} onChange={e => setDetalle(e.target.value)} placeholder="Detalle del estado general..." rows={3} style={TXA}/>
      </div>
      <div style={{ background:"#1a1a1a", borderRadius:16, padding:16, marginBottom:16, border:"1px solid #2a2a2a" }}>
        <h3 style={ST}>💡 Recomendaciones de mantenimiento</h3>
        <textarea value={recomendaciones} onChange={e => setRecomendaciones(e.target.value)} placeholder="Ej: Alineado y balanceado, revisión de frenos..." rows={3} style={TXA}/>
      </div>

      <button onClick={handleSave} style={{ width:"100%", padding:"16px", background:"linear-gradient(135deg,#f97316,#ea580c)", border:"none", color:"#fff", borderRadius:14, cursor:"pointer", fontWeight:900, fontSize:16 }}>
        Guardar Chequeo
      </button>
    </div>
  );
}


/* ─────────────── REPAIRS PAGE ─────────────── */
function RepairsPage({ data, setPage }) {
  const [search, setSearch] = useState("");
  const [selected, setSelected] = useState(null); // { type:"client"|"vehicle", entity, repairs, name, plate, vehicle }
  const [showForm, setShowForm] = useState(false);
  const [saving, setSaving] = useState(false);

  // Construir lista unificada de entidades buscables
  const entities = [
    ...data.clients.map(c => ({
      type: "client",
      id: c.id,
      name: c.name || "Sin nombre",
      plate: c.plate || "—",
      vehicle: c.vehicle || "—",
      sub: `Plan ${PLANS.find(p=>p.id===c.service)?.name || c.service}`,
      icon: "👤",
      color: "#f97316",
      repairs: c.repairs || [],
      raw: c,
    })),
    ...data.companies.flatMap(comp =>
      (comp.vehicles || []).map(v => ({
        type: "vehicle",
        id: v.id,
        companyId: comp.id,
        name: comp.name || "Sin nombre",
        plate: v.plate || "—",
        vehicle: v.vehicle || v.plate || "—",
        nroMovil: v.nroMovil || "",
        sub: comp.name,
        icon: "🚛",
        color: "#60a5fa",
        repairs: v.repairs || [],
        raw: v,
        rawCompany: comp,
      }))
    ),
  ];

  const filtered = search.length < 1 ? entities : entities.filter(e =>
    e.name.toLowerCase().includes(search.toLowerCase()) ||
    e.plate.toLowerCase().includes(search.toLowerCase()) ||
    e.vehicle.toLowerCase().includes(search.toLowerCase()) ||
    (e.nroMovil||"").toLowerCase().includes(search.toLowerCase())
  );

  // Estadísticas de reparaciones del seleccionado
  function getRepairStats(repairs) {
    if (!repairs || repairs.length === 0) return null;
    const total = repairs.reduce((a, r) => a + (Number(r.costo) || 0), 0);
    const lastYear = Date.now() - 365 * 24 * 3600 * 1000;
    const totalAnio = repairs.filter(r => r.createdAt > lastYear).reduce((a, r) => a + (Number(r.costo) || 0), 0);
    const byCat = REPAIR_CATS.map(cat => ({
      ...cat,
      count: repairs.filter(r => r.categoria === cat.id).length,
      total: repairs.filter(r => r.categoria === cat.id).reduce((a, r) => a + (Number(r.costo) || 0), 0),
    })).filter(c => c.count > 0).sort((a, b) => b.total - a.total);
    let salud = null;
    if (repairs.length >= 2) {
      if (totalAnio > 500000) salud = { color:"#ef4444", bg:"#ef444422", border:"#ef444444", icon:"🔴", label:"Alto costo", msg:`Gasto anual ${formatMoney(totalAnio)} — Evaluar conveniencia del vehículo` };
      else if (totalAnio > 200000) salud = { color:"#f59e0b", bg:"#f59e0b22", border:"#f59e0b44", icon:"🟡", label:"Costo moderado", msg:`Gasto anual ${formatMoney(totalAnio)} — Seguimiento recomendado` };
      else salud = { color:"#10b981", bg:"#10b98122", border:"#10b98144", icon:"🟢", label:"Buen estado", msg:`Gasto anual ${formatMoney(totalAnio)} — Vehículo económicamente sano` };
    }
    // También calcular salud mecánica cruzando con chequeos
    const entityChecks = selected ? data.checks.filter(ch =>
      selected.type === "client" ? ch.clientId === selected.id : ch.vehicleId === selected.id
    ) : [];
    let checksHealth = null;
    if (entityChecks.length > 0) {
      const allItems = CHECK_SECTIONS.flatMap(s => s.items);
      const lastCheck = entityChecks[0];
      const estados = lastCheck.itemStates || {};
      const ok = allItems.filter(i => estados[i.id] === "ok").length;
      const critico = allItems.filter(i => estados[i.id] === "critico").length;
      const pct = Math.round((ok / allItems.length) * 100);
      checksHealth = { pct, critico, ok, date: new Date(lastCheck.createdAt).toLocaleDateString("es-AR") };
    }
    return { total, totalAnio, byCat, salud, checksHealth };
  }

  async function saveRepair(repData) {
    if (!selected) return;
    setSaving(true);
    if (selected.type === "client") {
      const updated = [...selected.repairs, repData];
      await fbUpdate("clients", selected.id, { repairs: updated });
    } else {
      const updatedVehicles = (selected.rawCompany.vehicles || []).map(v =>
        v.id === selected.id ? { ...v, repairs: [...(v.repairs || []), repData] } : v
      );
      await fbUpdate("companies", selected.companyId, { vehicles: updatedVehicles });
    }
    setSaving(false);
    setShowForm(false);
    // Refresh selected from data
    setSelected(prev => {
      if (!prev) return prev;
      if (prev.type === "client") {
        const updated = data.clients.find(c => c.id === prev.id);
        return updated ? { ...prev, repairs: [...(updated.repairs || []), repData] } : prev;
      } else {
        return { ...prev, repairs: [...prev.repairs, repData] };
      }
    });
  }

  async function deleteRepair(idx) {
    if (!selected) return;
    if (!confirm("¿Eliminar esta reparación?")) return;
    if (selected.type === "client") {
      const updated = selected.repairs.filter((_, i) => i !== idx);
      await fbUpdate("clients", selected.id, { repairs: updated });
      setSelected(prev => prev ? { ...prev, repairs: updated } : prev);
    } else {
      const updated = selected.repairs.filter((_, i) => i !== idx);
      const updatedVehicles = (selected.rawCompany.vehicles || []).map(v =>
        v.id === selected.id ? { ...v, repairs: updated } : v
      );
      await fbUpdate("companies", selected.companyId, { vehicles: updatedVehicles });
      setSelected(prev => prev ? { ...prev, repairs: updated } : prev);
    }
  }

  async function toggleRepairEstado(idx, newEstado) {
    if (!selected) return;
    if (selected.type === "client") {
      const updated = selected.repairs.map((r, i) => i === idx ? { ...r, estado: newEstado } : r);
      await fbUpdate("clients", selected.id, { repairs: updated });
      setSelected(prev => prev ? { ...prev, repairs: updated } : prev);
    } else {
      const updated = selected.repairs.map((r, i) => i === idx ? { ...r, estado: newEstado } : r);
      const updatedVehicles = (selected.rawCompany.vehicles || []).map(v =>
        v.id === selected.id ? { ...v, repairs: updated } : v
      );
      await fbUpdate("companies", selected.companyId, { vehicles: updatedVehicles });
      setSelected(prev => prev ? { ...prev, repairs: updated } : prev);
    }
  }

  const [trailerMode, setTrailerMode] = useState(false); // si estamos cargando reparación del trailer
  const [showTrailerForm, setShowTrailerForm] = useState(false);

  // Obtener la entidad raw para chequear si tiene trailer
  function getRawEntity() {
    if (!selected) return null;
    if (selected.type === "client") return data.clients.find(c => c.id === selected.id);
    const comp = data.companies.find(c => c.id === selected.companyId);
    return comp ? (comp.vehicles||[]).find(v => v.id === selected.id) : null;
  }

  // Reparaciones del trailer (guardadas en raw.trailerRepairs)
  function getTrailerRepairs() {
    const raw = getRawEntity();
    return raw ? (raw.trailerRepairs || []) : [];
  }

  async function saveTrailerRepair(repData) {
    if (!selected) return;
    setSaving(true);
    const existing = getTrailerRepairs();
    const updated = [...existing, repData];
    if (selected.type === "client") {
      await fbUpdate("clients", selected.id, { trailerRepairs: updated });
    } else {
      const comp = selected.rawCompany || data.companies.find(c => c.id === selected.companyId);
      if (comp) {
        const updatedVehicles = (comp.vehicles||[]).map(v =>
          v.id === selected.id ? { ...v, trailerRepairs: updated } : v
        );
        await fbUpdate("companies", selected.companyId, { vehicles: updatedVehicles });
      }
    }
    setSaving(false);
    setShowTrailerForm(false);
  }

  async function deleteTrailerRepair(idx) {
    if (!selected) return;
    if (!confirm("¿Eliminar esta reparación del trailer?")) return;
    const updated = getTrailerRepairs().filter((_, i) => i !== idx);
    if (selected.type === "client") {
      await fbUpdate("clients", selected.id, { trailerRepairs: updated });
    } else {
      const comp = selected.rawCompany || data.companies.find(c => c.id === selected.companyId);
      if (comp) {
        const updatedVehicles = (comp.vehicles||[]).map(v =>
          v.id === selected.id ? { ...v, trailerRepairs: updated } : v
        );
        await fbUpdate("companies", selected.companyId, { vehicles: updatedVehicles });
      }
    }
  }

  async function toggleTrailerRepairEstado(idx, newEstado) {
    const existing = getTrailerRepairs();
    const updated = existing.map((r, i) => i === idx ? { ...r, estado: newEstado } : r);
    if (selected.type === "client") {
      await fbUpdate("clients", selected.id, { trailerRepairs: updated });
    } else {
      const comp = selected.rawCompany || data.companies.find(c => c.id === selected.companyId);
      if (comp) {
        const updatedVehicles = (comp.vehicles||[]).map(v =>
          v.id === selected.id ? { ...v, trailerRepairs: updated } : v
        );
        await fbUpdate("companies", selected.companyId, { vehicles: updatedVehicles });
      }
    }
  }

  function shareTrailerRepair(r) {
    const cat = REPAIR_CATS.find(c => c.id === r.categoria);
    const msg = `🔧 *REPARACIÓN TRAILER — ASN Control Vehicular*\n` +
      (selected.type === "client" ? `👤 Cliente: ${selected.name}\n` : `🏢 Empresa: ${selected.name}\n`) +
      `🚐 Trailer del vehículo: ${selected.plate}\n` +
      `━━━━━━━━━━━━━━━━━━━━\n` +
      `📋 ${r.descripcion}\n` +
      `📂 Categoría: ${cat?.label || r.categoria}\n` +
      `📅 Fecha: ${new Date(r.createdAt).toLocaleDateString("es-AR")}\n` +
      `💰 Costo: ${formatMoney(r.costo)}\n` +
      (r.taller ? `🏪 Taller: ${r.taller}\n` : "") +
      (r.notas ? `📝 Notas: ${r.notas}\n` : "") +
      `━━━━━━━━━━━━━━━━━━━━\n_ASN · Control y Prevención Vehicular_`;
    window.open("https://wa.me/?text=" + encodeURIComponent(msg), "_blank");
  }

  function shareRepair(r) {
    const isClient = selected.type === "client";
    const cat = REPAIR_CATS.find(c => c.id === r.categoria);
    const msg = `🔧 *REPARACIÓN — ASN Control Vehicular*\n` +
      (isClient ? `👤 Cliente: ${selected.name}\n` : `🏢 Empresa: ${selected.name}\n`) +
      `🚗 Vehículo: ${selected.vehicle}\n🔖 Dominio: ${selected.plate}\n` +
      (selected.nroMovil ? `🔢 Móvil: ${selected.nroMovil}\n` : "") +
      `━━━━━━━━━━━━━━━━━━━━\n` +
      `📋 ${r.descripcion}\n` +
      `📂 Categoría: ${cat?.label || r.categoria}\n` +
      `📅 Fecha: ${new Date(r.createdAt).toLocaleDateString("es-AR")}\n` +
      `💰 Costo: ${formatMoney(r.costo)}\n` +
      (r.taller ? `🏪 Taller: ${r.taller}\n` : "") +
      (r.notas ? `📝 Notas: ${r.notas}\n` : "") +
      `━━━━━━━━━━━━━━━━━━━━\n_ASN · Control y Prevención Vehicular_`;
    window.open("https://wa.me/?text=" + encodeURIComponent(msg), "_blank");
  }

  const stats = selected ? getRepairStats(selected.repairs) : null;

  // Sync selected repairs from live data
  React.useEffect(() => {
    if (!selected) return;
    if (selected.type === "client") {
      const live = data.clients.find(c => c.id === selected.id);
      if (live) setSelected(prev => ({ ...prev, repairs: live.repairs || [] }));
    } else {
      const liveComp = data.companies.find(c => c.id === selected.companyId);
      if (liveComp) {
        const liveVeh = (liveComp.vehicles || []).find(v => v.id === selected.id);
        if (liveVeh) setSelected(prev => ({ ...prev, repairs: liveVeh.repairs || [], rawCompany: liveComp }));
      }
    }
  }, [data]);

  return (
    <div style={{ padding:"14px 14px 100px", animation:"fadeSlideIn 0.2s ease" }}>
      <button onClick={() => selected ? setSelected(null) : setPage("dashboard")}
        style={{ background:"none", border:"none", color:"#7c3aed", cursor:"pointer", fontSize:13, fontWeight:700, marginBottom:16, padding:"6px 0", letterSpacing:"0.04em" }}>
        ← {selected ? "Buscar otro" : "Volver"}
      </button>
      <h2 style={{ fontFamily:"'Barlow Condensed',sans-serif", color:"#a78bfa", margin:"0 0 4px", fontSize:26, fontWeight:900, letterSpacing:"0.03em", textTransform:"uppercase" }}>🔧 Reparaciones</h2>
      <p style={{ color:"#6b7280", fontSize:13, margin:"0 0 20px" }}>Historial y pedidos por vehículo</p>

      {!selected ? (
        <>
          <input value={search} onChange={e => setSearch(e.target.value)} placeholder="Buscar por nombre, dominio, vehículo..."
            style={{ width:"100%", padding:"13px 16px", borderRadius:12, background:"#1a1a1a", border:"1px solid #7c3aed55", color:"#e5e7eb", fontSize:14, marginBottom:16, outline:"none" }}
            autoFocus/>
          {search.length === 0 && (
            <div style={{ textAlign:"center", padding:"32px 0", color:"#4b5563" }}>
              <div style={{ fontSize:48, marginBottom:12 }}>🔍</div>
              <div style={{ fontSize:14 }}>Escribí un nombre o dominio para buscar</div>
            </div>
          )}
          {filtered.map(e => {
            const repCount = e.repairs.length;
            const totalCosto = e.repairs.reduce((a, r) => a + (Number(r.costo) || 0), 0);
            return (
              <div key={`${e.type}-${e.id}`} onClick={() => setSelected(e)}
                style={{ background:"#1a1a1a", borderRadius:16, padding:"14px 16px", border:`1px solid ${e.color}33`, cursor:"pointer", display:"flex", alignItems:"center", gap:12, marginBottom:10 }}>
                <div style={{ width:44, height:44, borderRadius:12, background:`${e.color}22`, border:`1px solid ${e.color}55`, display:"flex", alignItems:"center", justifyContent:"center", fontSize:22, flexShrink:0 }}>{e.icon}</div>
                <div style={{ flex:1, minWidth:0 }}>
                  <div style={{ color:"#f1f5f9", fontWeight:700, fontSize:15, marginBottom:2 }}>{e.name}</div>
                  <div style={{ color:"#6b7280", fontSize:12 }}>{e.plate} · {e.vehicle}</div>
                  {e.nroMovil && <div style={{ color:"#6b7280", fontSize:11 }}>Móvil: {e.nroMovil}</div>}
                </div>
                <div style={{ textAlign:"right", flexShrink:0 }}>
                  <div style={{ color:"#a78bfa", fontWeight:900, fontSize:16 }}>{repCount}</div>
                  <div style={{ color:"#4b5563", fontSize:11 }}>reparac.</div>
                  {totalCosto > 0 && <div style={{ color:"#6b7280", fontSize:10 }}>{formatMoney(totalCosto)}</div>}
                </div>
              </div>
            );
          })}
        </>
      ) : (
        <>
          {/* Header del vehículo seleccionado */}
          <div style={{ background:"#1a1a1a", borderRadius:20, padding:20, border:`1px solid ${selected.color}44`, marginBottom:16 }}>
            <div style={{ display:"flex", alignItems:"center", gap:12, marginBottom:8 }}>
              <span style={{ fontSize:32 }}>{selected.icon}</span>
              <div>
                <h2 style={{ color:"#f1f5f9", margin:0, fontSize:18, fontWeight:900 }}>{selected.plate}</h2>
                <div style={{ color:selected.color, fontSize:12 }}>{selected.name}</div>
              </div>
            </div>
            <div style={{ color:"#9ca3af", fontSize:13 }}>{selected.vehicle}</div>
            {selected.nroMovil && <div style={{ color:"#9ca3af", fontSize:12 }}>Móvil: {selected.nroMovil}</div>}
          </div>

          {/* Tabs vehículo / trailer (si tiene trailer) */}
          {(() => {
            const raw = getRawEntity();
            const tieneTrailer = raw?.tieneTrailer;
            if (!tieneTrailer) return null;
            return (
              <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:8, marginBottom:16 }}>
                <button onClick={() => setTrailerMode(false)}
                  style={{ padding:"10px", borderRadius:10, cursor:"pointer", border:`2px solid ${!trailerMode ? "#a78bfa" : "#2a2a2a"}`, background: !trailerMode ? "#a78bfa22" : "#111", color: !trailerMode ? "#a78bfa" : "#6b7280", fontWeight:700, fontSize:13 }}>
                  🚗 Vehículo
                </button>
                <button onClick={() => setTrailerMode(true)}
                  style={{ padding:"10px", borderRadius:10, cursor:"pointer", border:`2px solid ${trailerMode ? "#f59e0b" : "#2a2a2a"}`, background: trailerMode ? "#f59e0b22" : "#111", color: trailerMode ? "#f59e0b" : "#6b7280", fontWeight:700, fontSize:13 }}>
                  🚐 Trailer ({getTrailerRepairs().length})
                </button>
              </div>
            );

                <div style={{ color:"#f59e0b", fontSize:12, fontWeight:700, textTransform:"uppercase", marginBottom:8 }}>🚐 Trailer de {selected.plate}</div>

                  const tc = raw?.trailerCheck || {};
                  const criticos = TRAILER_CHECK_ITEMS.filter(i => tc[i.id] === "critico").length;

                    <div style={{ color:"#9ca3af", fontSize:12 }}>

              {stats.checksHealth && (
                <div style={{ background:"#111", borderRadius:12, padding:"12px 14px", marginBottom:12, border:"1px solid #2a2a2a" }}>
                  <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:8 }}>

                <div>
                  <div style={{ color:"#6b7280", fontSize:11, fontWeight:700, textTransform:"uppercase", marginBottom:8 }}>Por categoría</div>
                  {stats.byCat.map(cat => (
                    <div key={cat.id} style={{ display:"flex", alignItems:"center", gap:8, marginBottom:6 }}>
                      <span style={{ fontSize:14 }}>{cat.icon}</span>
                      <span style={{ color:"#9ca3af", fontSize:12, flex:1 }}>{cat.label}</span>

                    </div>
                  ))}
                </div>
              )}
            </div>
          )}

          {/* Botón agregar reparación */}
          {!showForm && (
            <button onClick={() => setShowForm(true)}
              style={{ width:"100%", padding:"14px", background:"linear-gradient(135deg,#7c3aed,#6d28d9)", border:"none", color:"#fff", borderRadius:14, cursor:"pointer", fontWeight:900, fontSize:15, marginBottom:16 }}>
              + Cargar nueva reparación
            </button>
          )}

          {showForm && (
            <RepairForm onSave={saveRepair} onCancel={() => setShowForm(false)}/>
          )}

          {/* Historial */}
          <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:12 }}>
            <h3 style={{ color:"#e5e7eb", fontSize:13, fontWeight:700, letterSpacing:"0.05em", textTransform:"uppercase", margin:0 }}>
              Historial ({selected.repairs.length})
            </h3>
          </div>

          {selected.repairs.length === 0 ? (
            <div style={{ textAlign:"center", color:"#4b5563", padding:"32px 0", fontSize:13 }}>
              <div style={{ fontSize:40, marginBottom:10 }}>🔧</div>
              <div>Sin reparaciones registradas</div>
            </div>
          ) : (
            <RepairList repairs={selected.repairs} onDelete={deleteRepair} onShare={shareRepair} onToggleEstado={toggleRepairEstado}/>
          )}
          </>
          )}
        </>
      )}
    </div>
  );
}

function MaquinaDetail({ maquina, data, setPage, setSelectedMaquina }) {
  const [showCheckForm, setShowCheckForm] = useState(false);
  const [saving, setSaving] = useState(false);
  const [showRepairForm, setShowRepairForm] = useState(false);
  const [tab, setTab] = useState("chequeos"); // "chequeos" | "reparaciones"

  // Leer la versión más fresca de la cantera desde Firebase
  const freshMaquina = (data.maquinas||[]).find(m => m.id === maquina.id) || maquina;
  const checks = [...(freshMaquina.checks||[])].sort((a,b) => b.createdAt - a.createdAt);
  const tipo = MAQUINA_TIPOS.find(t => t.id === freshMaquina.tipo);
  const repairs = freshMaquina.repairs || [];

  async function saveCheck(checkData) {
    setSaving(true);
    const updated = [...(freshMaquina.checks||[]), checkData];
    await fbUpdate("maquinas", freshMaquina.id, { checks: updated });
    setShowCheckForm(false);
    setSaving(false);
  }

  const [confirmDeleteMaqCheckAt, setConfirmDeleteMaqCheckAt] = useState(null);
  async function deleteCheck(createdAt) {
    const updated = (freshMaquina.checks||[]).filter(ch => ch.createdAt !== createdAt);
    await fbUpdate("maquinas", freshMaquina.id, { checks: updated });
    setConfirmDeleteMaqCheckAt(null);
  }

  async function addRepair(repData) {
    const updated = [...repairs, repData];
    await fbUpdate("maquinas", freshMaquina.id, { repairs: updated });
    setShowRepairForm(false);
  }

  async function deleteRepair(idx) {
    const updated = repairs.filter((_, i) => i !== idx);
    await fbUpdate("maquinas", freshMaquina.id, { repairs: updated });
  }

  async function toggleRepairEstado(idx, newEstado) {
    const updated = repairs.map((r, i) => i === idx ? { ...r, estado: newEstado } : r);
    await fbUpdate("maquinas", freshMaquina.id, { repairs: updated });
  }

  function shareRepair(r) {
    const cat = REPAIR_CATS.find(c => c.id === r.categoria);
    const msg = `🔧 *REPARACIÓN — ASN Control Vehicular*\n` +
      `🏗️ Máquina: ${freshMaquina.nombre || tipo?.label}\n` +
      (freshMaquina.cantera ? `🏢 Empresa: ${freshMaquina.cantera}\n` : "") +
      (freshMaquina.dominio ? `🔖 Dominio: ${freshMaquina.dominio}\n` : "") +
      `━━━━━━━━━━━━━━━━━━━━\n` +
      `📋 ${r.descripcion}\n` +
      `📂 Categoría: ${cat?.label || r.categoria}\n` +
      `📅 Fecha: ${new Date(r.createdAt).toLocaleDateString("es-AR")}\n` +
      `💰 Costo: ${formatMoney(r.costo)}\n` +
      (r.taller ? `🏪 Taller: ${r.taller}\n` : "") +
      (r.notas ? `📝 Notas: ${r.notas}\n` : "") +
      `━━━━━━━━━━━━━━━━━━━━\n_ASN · Control y Prevención Vehicular_`;
    let tel = (freshMaquina.phone||"").replace(/\D/g, "");
    const url = tel ? `https://wa.me/54${tel}?text=${encodeURIComponent(msg)}` : `https://wa.me/?text=${encodeURIComponent(msg)}`;
    window.open(url, "_blank");
  }

  function enviarWppCheck(ch, idx) {
    const allItems = MAQUINA_CHECK_SECTIONS.flatMap(s => s.items);
    const estados = ch.itemStates || {};
    const criticos = allItems.filter(i => estados[i.id] === "critico").map(i => i.label);
    const prevencion = allItems.filter(i => estados[i.id] === "prevencion").map(i => i.label);
    const okCount = allItems.filter(i => estados[i.id] === "ok").length;
    const fecha = new Date(ch.createdAt).toLocaleDateString("es-AR");
    let msg = `🏗️ *INFORME DE MAQUINARIA*\n*ASN · Control y Prevención Vehicular*\n━━━━━━━━━━━━━━━━━━━━\n\n`;
    msg += `🏗️ *Máquina:* ${freshMaquina.nombre || tipo?.label}\n`;
    if (freshMaquina.cantera) msg += `🏢 *Empresa:* ${freshMaquina.cantera}\n`;
    if (freshMaquina.dominio) msg += `🔖 *Dominio:* ${freshMaquina.dominio}\n`;
    msg += `📅 *Fecha:* ${fecha}\n`;
    if (ch.perito) msg += `👷 *Perito:* ${ch.perito}\n`;
    if (ch.horasMotor) msg += `⏱️ *Horas de motor:* ${ch.horasMotor} hs\n`;
    msg += `\n━━━━━━━━━━━━━━━━━━━━\n✅ Ítems OK: *${okCount}/${allItems.length}*\n━━━━━━━━━━━━━━━━━━━━\n\n`;
    if (criticos.length > 0) { msg += `🔴 *CRÍTICO — Atención inmediata:*\n`; criticos.forEach(i => { msg += `  • ${i}\n`; }); msg += `\n`; }
    if (prevencion.length > 0) { msg += `🟡 *PREVENCIÓN — Seguimiento:*\n`; prevencion.forEach(i => { msg += `  • ${i}\n`; }); msg += `\n`; }
    if (ch.recomendaciones) { msg += `━━━━━━━━━━━━━━━━━━━━\n💡 *Recomendaciones:*\n${ch.recomendaciones}\n\n`; }
    msg += `━━━━━━━━━━━━━━━━━━━━\n_ASN · Control y Prevención Vehicular_`;
    let tel = (freshMaquina.phone||"").replace(/\D/g,"");
    const url = tel ? `https://wa.me/54${tel}?text=${encodeURIComponent(msg)}` : `https://wa.me/?text=${encodeURIComponent(msg)}`;
    window.open(url, "_blank");
  }

  function exportarPDFMaquina(ch) {
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF({ orientation:"portrait", unit:"mm", format:"a4" });
    const allItems = MAQUINA_CHECK_SECTIONS.flatMap(s => s.items);
    const estados = ch.itemStates || {};
    const fecha = new Date(ch.createdAt).toLocaleDateString("es-AR");
    const okCount = allItems.filter(i => estados[i.id] === "ok").length;
    const criticoItems = allItems.filter(i => estados[i.id] === "critico");
    const pct = Math.round((okCount / allItems.length) * 100);
    const barColor = criticoItems.length > 0 ? [239,68,68] : pct >= 80 ? [16,185,129] : [245,158,11];
    const W = 210, M = 14;
    let y = 14;
    doc.setDrawColor(167,139,250); doc.setLineWidth(0.8);
    doc.line(M, y + 10, W - M, y + 10);
    doc.setFontSize(20); doc.setFont("helvetica","bold"); doc.setTextColor(167,139,250);
    doc.text("ASN", M, y + 7);
    doc.setFontSize(9); doc.setFont("helvetica","normal"); doc.setTextColor(107,114,128);
    doc.text("Control y Prevención Vehicular", M + 16, y + 4);
    doc.setFontSize(8); doc.setTextColor(55,65,81);
    doc.text("Informe de Maquinaria Pesada", M + 16, y + 8.5);
    doc.setFontSize(8); doc.setTextColor(107,114,128);
    doc.text("Fecha: " + fecha + (ch.perito ? "   Perito: " + ch.perito : ""), W - M, y + 4, { align:"right" });
    y += 16;
    let infoBody = [["Máquina", freshMaquina.nombre || tipo?.label || "—"]];
    if (freshMaquina.cantera)  infoBody.push(["Empresa",  freshMaquina.cantera]);
    if (freshMaquina.dominio)  infoBody.push(["Dominio",  freshMaquina.dominio]);
    if (freshMaquina.nroSerie) infoBody.push(["N° Serie", freshMaquina.nroSerie]);
    if (ch.horasMotor)         infoBody.push(["Horas motor", ch.horasMotor + " hs"]);
    doc.autoTable({ startY: y, body: infoBody, theme:"plain", styles:{ fontSize:9, cellPadding:2.5, textColor:[55,65,81] }, columnStyles:{ 0:{ fontStyle:"bold", textColor:[107,114,128], cellWidth:35 }, 1:{ textColor:[17,24,39] } }, margin:{ left:M, right:M } });
    y = doc.lastAutoTable.finalY + 5;
    const cards = [
      { val:okCount,              label:"OK",         color:[16,185,129] },
      { val:criticoItems.length,  label:"Críticos",   color:[239,68,68]  },
      { val:allItems.filter(i=>estados[i.id]==="prevencion").length, label:"Prevención", color:[245,158,11] },
    ];
    const cardW = (W - M*2 - 6) / 3;
    cards.forEach((c, i) => {
      const cx = M + i*(cardW+3);
      doc.setFillColor(249,250,251); doc.setDrawColor(229,231,235); doc.setLineWidth(0.3);
      doc.roundedRect(cx, y, cardW, 16, 2, 2, "FD");
      doc.setFontSize(14); doc.setFont("helvetica","bold"); doc.setTextColor(...c.color);
      doc.text(String(c.val), cx + cardW/2, y+9, { align:"center" });
      doc.setFontSize(7); doc.setFont("helvetica","normal"); doc.setTextColor(107,114,128);
      doc.text(c.label, cx + cardW/2, y+14, { align:"center" });
    });
    y += 20;
    doc.setFillColor(229,231,235); doc.roundedRect(M, y, W-M*2, 4, 2, 2, "F");
    doc.setFillColor(...barColor); doc.roundedRect(M, y, (W-M*2)*pct/100, 4, 2, 2, "F");
    y += 8;
    const estadoColors = { ok:[16,185,129], critico:[239,68,68], prevencion:[245,158,11], solicitar:[96,165,250], no:[107,114,128] };
    MAQUINA_CHECK_SECTIONS.forEach(sec => {
      const rows = sec.items.map(item => {
        const e = estados[item.id];
        const est = ESTADOS.find(x => x.id === e);
        return [item.label, est ? est.label : "—", e || ""];
      });
      doc.autoTable({
        startY: y, head:[[sec.icon + "  " + sec.title, "Estado"]], body: rows.map(r => [r[0], r[1]]),
        theme:"striped", styles:{ fontSize:8, cellPadding:2, textColor:[55,65,81], fillColor:[255,255,255] },
        headStyles:{ fillColor:[243,244,246], textColor:[55,65,81], fontStyle:"bold", fontSize:8 },
        alternateRowStyles:{ fillColor:[249,250,251] },
        columnStyles:{ 0:{ cellWidth:"auto" }, 1:{ cellWidth:26, halign:"right" } },
        margin:{ left:M, right:M },
        didParseCell(data) {
          if (data.column.index === 1 && data.section === "body") {
            const stateKey = rows[data.row.index]?.[2];
            const col = estadoColors[stateKey] || [107,114,128];
            data.cell.styles.textColor = col;
            data.cell.styles.fontStyle = "bold";
          }
        },
      });
      y = doc.lastAutoTable.finalY + 3;
    });
    if (ch.recomendaciones) {
      const lines = doc.splitTextToSize(ch.recomendaciones, W-M*2-6);
      doc.setFillColor(255,251,235); doc.setDrawColor(252,211,77); doc.setLineWidth(0.3);
      doc.roundedRect(M, y, W-M*2, lines.length*4+10, 2, 2, "FD");
      doc.setFontSize(8); doc.setFont("helvetica","bold"); doc.setTextColor(146,64,14);
      doc.text("Recomendaciones", M+3, y+5);
      doc.setFont("helvetica","normal"); doc.setTextColor(92,64,14);
      doc.text(lines, M+3, y+10);
      y += lines.length*4+14;
    }
    const pageH = doc.internal.pageSize.getHeight();
    doc.setDrawColor(167,139,250); doc.setLineWidth(0.5);
    doc.line(M, pageH-12, W-M, pageH-12);
    doc.setFontSize(7); doc.setFont("helvetica","normal"); doc.setTextColor(107,114,128);
    doc.text("ASN \xB7 Control y Prevenci\xF3n Vehicular", M, pageH-7);
    doc.text("Generado: " + new Date().toLocaleDateString("es-AR"), W-M, pageH-7, { align:"right" });
    const nombre = "ASN_Maquina_" + (freshMaquina.dominio || freshMaquina.nombre || "maquina").replace(/\s/g,"_") + "_" + fecha.replace(/\//g,"-") + ".pdf";
    doc.save(nombre);
  }

  async function deleteMaquina() {
    if (!confirm(`¿Eliminar ${freshMaquina.nombre || tipo?.label}?`)) return;
    await fbDelete("maquinas", freshMaquina.id);
    setPage("maquinaria");
  }

  function getHealth(ch) {
    const allItems = MAQUINA_CHECK_SECTIONS.flatMap(s => s.items);
    const criticos = allItems.filter(i => (ch.itemStates||{})[i.id] === "critico").length;
    const ok = allItems.filter(i => (ch.itemStates||{})[i.id] === "ok").length;
    const pct = Math.round((ok / allItems.length) * 100);
    const color = criticos > 0 ? "#ef4444" : pct >= 80 ? "#10b981" : "#f59e0b";
    return { criticos, ok, pct, color };
  }

  const lastCheck = checks[0];
  const health = lastCheck ? getHealth(lastCheck) : null;

  return (
    <div style={{ padding:"14px 14px 100px", animation:"fadeSlideIn 0.2s ease" }}>
      <button onClick={() => setPage("maquinaria")} style={{ background:"none", border:"none", color:"#7c3aed", cursor:"pointer", fontSize:13, fontWeight:700, marginBottom:16, padding:"6px 0", letterSpacing:"0.04em" }}>← Volver</button>

      {/* Header */}
      <div style={{ background:"#1a1a1a", borderRadius:20, padding:20, border:"1px solid #a78bfa44", marginBottom:16 }}>
        <div style={{ display:"flex", alignItems:"center", gap:14, marginBottom:14 }}>
          <div style={{ width:56, height:56, borderRadius:16, background:"#a78bfa22", border:`2px solid ${health?.color||"#a78bfa"}`, display:"flex", alignItems:"center", justifyContent:"center", fontSize:28 }}>
            {tipo?.icon || "⚙️"}
          </div>
          <div>
            <h2 style={{ color:"#f1f5f9", margin:0, fontSize:18, fontWeight:900 }}>{freshMaquina.nombre || tipo?.label}</h2>
            <span style={{ color:"#a78bfa", fontSize:12, fontWeight:700 }}>{tipo?.label}</span>
          </div>
        </div>

        {[
          freshMaquina.cantera    && ["🏢 Empresa",    freshMaquina.cantera],
          freshMaquina.dominio    && ["🔖 Dominio",    freshMaquina.dominio],
          freshMaquina.nroChasis  && ["🔩 Chasis",     freshMaquina.nroChasis],
          freshMaquina.nroSerie   && ["🔢 N° Serie",   freshMaquina.nroSerie],
          freshMaquina.nroInterno && ["🏷️ Interno",    freshMaquina.nroInterno],
          freshMaquina.responsable&& ["👤 Responsable",freshMaquina.responsable],
          freshMaquina.phone      && ["📱 Teléfono",   freshMaquina.phone],
          freshMaquina.notes      && ["📝 Notas",      freshMaquina.notes],
        ].filter(Boolean).map(([l,v]) => (
          <div key={l} style={{ display:"flex", justifyContent:"space-between", gap:8, marginBottom:6 }}>
            <span style={{ color:"#6b7280", fontSize:13 }}>{l}</span>
            <span style={{ color:"#e5e7eb", fontSize:13, fontWeight:600, textAlign:"right" }}>{v}</span>
          </div>
        ))}

        {health && (
          <div style={{ marginTop:12, background:"#111", borderRadius:12, padding:12 }}>
            <div style={{ display:"flex", justifyContent:"space-between", marginBottom:6 }}>
              <span style={{ color:"#6b7280", fontSize:12 }}>Último chequeo</span>
              <span style={{ color:health.color, fontWeight:900, fontSize:14 }}>{health.pct}% OK</span>
            </div>
            <div style={{ width:"100%", height:8, background:"#2a2a2a", borderRadius:4, overflow:"hidden" }}>
              <div style={{ width:`${health.pct}%`, height:"100%", background: health.color, borderRadius:4 }}/>
            </div>
            {health.criticos > 0 && <div style={{ color:"#ef4444", fontSize:11, marginTop:6, fontWeight:700 }}>⚠️ {health.criticos} ítem(s) crítico(s)</div>}
          </div>
        )}
      </div>

      {/* Botón nuevo chequeo */}
      {!showCheckForm && tab === "chequeos" && (
        <button onClick={() => setShowCheckForm(true)}
          style={{ width:"100%", padding:"14px", background:"linear-gradient(135deg,#7c3aed,#6d28d9)", border:"none", color:"#fff", borderRadius:14, cursor:"pointer", fontWeight:900, fontSize:15, marginBottom:16 }}>
          + Nuevo chequeo de máquina
        </button>
      )}

      {/* Tabs */}
      <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:8, marginBottom:16 }}>
        <button onClick={() => { setTab("chequeos"); setShowCheckForm(false); }} style={{ padding:"10px", borderRadius:10, cursor:"pointer", border:`2px solid ${tab==="chequeos" ? "#a78bfa" : "#2a2a2a"}`, background: tab==="chequeos" ? "#a78bfa22" : "#111", color: tab==="chequeos" ? "#a78bfa" : "#6b7280", fontWeight:700, fontSize:13 }}>

        <button onClick={() => { setTab("reparaciones"); setShowCheckForm(false); }} style={{ padding:"10px", borderRadius:10, cursor:"pointer", border:`2px solid ${tab==="reparaciones" ? "#7c3aed" : "#2a2a2a"}`, background: tab==="reparaciones" ? "#7c3aed22" : "#111", color: tab==="reparaciones" ? "#a78bfa" : "#6b7280", fontWeight:700, fontSize:13 }}>
          🔧 Reparaciones ({repairs.length})
        </button>
      </div>

      {showCheckForm && (

      {/* Historial de chequeos */}
      {!showCheckForm && tab === "chequeos" && (
        <>
          <h3 style={{ color:"#e5e7eb", fontSize:13, fontWeight:700, letterSpacing:"0.05em", textTransform:"uppercase", marginBottom:12 }}>
            Historial ({checks.length})

          {checks.length === 0
            ? <div style={{ textAlign:"center", color:"#4b5563", padding:"24px 0", fontSize:14 }}><div style={{ fontSize:36, marginBottom:8 }}>🏗️</div>Sin chequeos registrados</div>
            : checks.map((ch, idx) => {
                const h = getHealth(ch);
                const fecha = new Date(ch.createdAt).toLocaleDateString("es-AR");
                return (
                  <div key={ch.createdAt} style={{ background:"#1a1a1a", borderRadius:14, padding:14, border:`1px solid ${h.color}33`, marginBottom:10 }}>
                    <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:8 }}>
                      <span style={{ color:"#9ca3af", fontSize:13 }}>📅 {fecha}</span>
                      <span style={{ color:h.color, fontWeight:900, fontSize:14 }}>{h.pct}% OK</span>
                    </div>
                    {ch.perito && <div style={{ color:"#6b7280", fontSize:12, marginBottom:4 }}>👷 {ch.perito}</div>}
                    {ch.horasMotor && <div style={{ color:"#6b7280", fontSize:12, marginBottom:4 }}>⏱️ {ch.horasMotor} hs de motor</div>}
                    <div style={{ display:"flex", gap:8, marginTop:8 }}>

                      {h.criticos > 0 && <div style={{ flex:1, background:"#ef444422", borderRadius:8, padding:"5px", textAlign:"center" }}>

                    </div>
                    {ch.recomendaciones && (
                      <div style={{ marginTop:8, background:"#2a2a2a", borderRadius:8, padding:"8px 10px", color:"#9ca3af", fontSize:12 }}>

                    <div style={{ display:"flex", gap:8, marginTop:10 }}>

                      <button onClick={() => exportarPDFMaquina(ch)} style={{ flex:1, padding:"9px 6px", borderRadius:10, background:"linear-gradient(135deg,#ef4444,#b91c1c)", border:"none", color:"#fff", fontWeight:700, fontSize:11, cursor:"pointer" }}>
                        📄 PDF

                      <button onClick={() => deleteCheck(ch.createdAt)} style={{ padding:"9px 12px", borderRadius:10, background:"transparent", border:"1px solid #ef444433", color:"#ef4444", fontWeight:700, fontSize:13, cursor:"pointer" }}>

      )}

      {/* Reparaciones */}
      {tab === "reparaciones" && (
        <>
          <RepairStats repairs={repairs}/>
          <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:12 }}>
            <h3 style={{ color:"#e5e7eb", fontSize:13, fontWeight:700, letterSpacing:"0.05em", textTransform:"uppercase", margin:0 }}>Historial de Reparaciones</h3>
            {!showRepairForm && <button onClick={() => setShowRepairForm(true)} style={{ padding:"8px 14px", borderRadius:10, background:"#7c3aed22", border:"1px solid #7c3aed44", color:"#a78bfa", fontWeight:700, fontSize:12, cursor:"pointer" }}>+ Agregar</button>}
          </div>
          {showRepairForm && <RepairForm onSave={addRepair} onCancel={() => setShowRepairForm(false)}/>}
          <RepairList repairs={repairs} onDelete={deleteRepair} onShare={shareRepair} onToggleEstado={toggleRepairEstado}/>
        </>
      )}

      <button onClick={deleteMaquina} style={{ width:"100%", marginTop:8, padding:"13px", background:"rgba(239,68,68,0.04)", border:"1px solid rgba(239,68,68,0.2)", color:"#ef4444", borderRadius:12, cursor:"pointer", fontWeight:700, fontSize:13, letterSpacing:"0.06em" }}>
        🗑️ Eliminar máquina
      </button>
    </div>
  );
}

/* ══════════════════════════════════════════════════════
   GPS / ALERTAS — Módulo completo

/* ── Tipos de alerta ── */
const ALERT_TYPES = [
  { id:"service",     label:"Service",           icon:"🔧", color:"#f97316" },
  { id:"frenos",      label:"Frenos",            icon:"🛑", color:"#ef4444" },
  { id:"vtv",         label:"VTV",               icon:"📋", color:"#60a5fa" },
  { id:"seguro",      label:"Seguro",            icon:"🔒", color:"#10b981" },
  { id:"habilitacion",label:"Habilitación",      icon:"📄", color:"#a78bfa" },
];

/* ── Calcular alertas para una entidad (vehículo o máquina) ──
   gpsConfig: { kmActuales, horasMotor, kmUltService, kmProxService,
                kmUltFreno, kmIntervFreno,
                vencVTV, vencSeguro, vencHabilitacion }
   Retorna array de { tipo, nivel: "critico"|"prevencion"|"ok", msg, diasOkm }
*/
function calcAlertas(gpsConfig = {}) {
  const alerts = [];
  const hoy = Date.now();
  const MS_DIA = 86400000;

  // ── Service por km ──
  if (gpsConfig.kmActuales && gpsConfig.kmProxService) {
    const kmActual = Number(gpsConfig.kmActuales);
    const kmProx   = Number(gpsConfig.kmProxService);
    const restantes = kmProx - kmActual;
    if (restantes <= 0) {
      alerts.push({ tipo:"service", nivel:"critico", msg:`Service VENCIDO (pasaron ${Math.abs(restantes).toLocaleString()} km)`, valor: restantes });
    } else if (restantes <= 2000) {
      alerts.push({ tipo:"service", nivel:"prevencion", msg:`Service en ${restantes.toLocaleString()} km`, valor: restantes });
    } else {
      alerts.push({ tipo:"service", nivel:"ok", msg:`Service OK — faltan ${restantes.toLocaleString()} km`, valor: restantes });
    }
  }

  // ── Frenos por km ──
  if (gpsConfig.kmActuales && gpsConfig.kmUltFreno && gpsConfig.kmIntervFreno) {
    const kmActual  = Number(gpsConfig.kmActuales);
    const kmProxF   = Number(gpsConfig.kmUltFreno) + Number(gpsConfig.kmIntervFreno);
    const restantes = kmProxF - kmActual;
    if (restantes <= 0) {
      alerts.push({ tipo:"frenos", nivel:"critico", msg:`Revisión de frenos VENCIDA (${Math.abs(restantes).toLocaleString()} km de retraso)`, valor: restantes });
    } else if (restantes <= 1500) {
      alerts.push({ tipo:"frenos", nivel:"prevencion", msg:`Frenos: revisión en ${restantes.toLocaleString()} km`, valor: restantes });
    } else {
      alerts.push({ tipo:"frenos", nivel:"ok", msg:`Frenos OK — faltan ${restantes.toLocaleString()} km`, valor: restantes });
    }
  }

  // ── Helper vencimiento de papeles ──
  function checkPapel(key, tipoId) {
    const val = gpsConfig[key];
    if (!val) return;
    const venc = new Date(val).getTime();
    const dias  = Math.round((venc - hoy) / MS_DIA);
    if (dias < 0) {
      alerts.push({ tipo: tipoId, nivel:"critico", msg:`${ALERT_TYPES.find(a=>a.id===tipoId)?.label} VENCIDO hace ${Math.abs(dias)} días`, valor: dias });
    } else if (dias <= 30) {
      alerts.push({ tipo: tipoId, nivel:"prevencion", msg:`${ALERT_TYPES.find(a=>a.id===tipoId)?.label} vence en ${dias} días`, valor: dias });
    } else {
      alerts.push({ tipo: tipoId, nivel:"ok", msg:`${ALERT_TYPES.find(a=>a.id===tipoId)?.label} OK — vence ${new Date(val).toLocaleDateString("es-AR")}`, valor: dias });
    }
  }
  checkPapel("vencVTV",         "vtv");
  checkPapel("vencSeguro",      "seguro");
  checkPapel("vencHabilitacion","habilitacion");

  return alerts;
}

/* ── Badge de nivel ── */
function AlertBadge({ nivel }) {
  const cfg = {
    critico:    { color:"#ef4444", bg:"#ef444422", border:"#ef444444", label:"CRÍTICO"    },
    prevencion: { color:"#f59e0b", bg:"#f59e0b22", border:"#f59e0b44", label:"PREVENCIÓN" },
    ok:         { color:"#10b981", bg:"#10b98122", border:"#10b98144", label:"OK"         },
  }[nivel] || {};
  return (
    <span style={{ fontSize:10, fontWeight:800, padding:"2px 8px", borderRadius:10,
      background:cfg.bg, color:cfg.color, border:`1px solid ${cfg.border}`, whiteSpace:"nowrap" }}>
      {cfg.label}
    </span>
  );
}

/* ── Generar mensaje WhatsApp de alerta ── */
function generarWppAlerta(entidad, tipo, alerts) {
  const criticos    = alerts.filter(a => a.nivel === "critico");
  const prevencion  = alerts.filter(a => a.nivel === "prevencion");
  const fecha = new Date().toLocaleDateString("es-AR");

  let msg = `📡 *ALERTA GPS — ASN Control Vehicular*\n`;
  msg += `━━━━━━━━━━━━━━━━━━━━\n`;
  if (tipo === "vehicle") {
    msg += `🏢 *Empresa:* ${entidad.companyName}\n`;
    msg += `🚛 *Vehículo:* ${entidad.vehicle}\n`;
    msg += `🔖 *Dominio:* ${entidad.plate}\n`;
    if (entidad.nroMovil) msg += `🔢 *Móvil:* ${entidad.nroMovil}\n`;
  } else {
    msg += `🏗️ *Máquina:* ${entidad.nombre}\n`;
    msg += `🏢 *Empresa:* ${entidad.cantera}
`;
    if (entidad.dominio) msg += `🔖 *Dominio:* ${entidad.dominio}\n`;
    if (entidad.nroInterno) msg += `🔢 *Interno:* ${entidad.nroInterno}\n`;
  }
  msg += `📅 *Fecha:* ${fecha}\n`;
  if (entidad.gpsConfig?.kmActuales) msg += `📍 *KM actuales:* ${Number(entidad.gpsConfig.kmActuales).toLocaleString()}\n`;
  if (entidad.gpsConfig?.horasMotor) msg += `⏱️ *Horas motor:* ${entidad.gpsConfig.horasMotor} hs\n`;
  msg += `━━━━━━━━━━━━━━━━━━━━\n\n`;

  if (criticos.length > 0) {
    msg += `🔴 *CRÍTICO — Atención inmediata:*\n`;
    criticos.forEach(a => { msg += `  • ${ALERT_TYPES.find(t=>t.id===a.tipo)?.icon} ${a.msg}\n`; });
    msg += `\n`;
  }
  if (prevencion.length > 0) {
    msg += `🟡 *PREVENCIÓN — Programar atención:*\n`;
    prevencion.forEach(a => { msg += `  • ${ALERT_TYPES.find(t=>t.id===a.tipo)?.icon} ${a.msg}\n`; });
    msg += `\n`;
  }
  msg += `━━━━━━━━━━━━━━━━━━━━\n_ASN · Control y Prevención Vehicular_`;
  return msg;
}
