/* ─────────────── INFORME DE FLOTAS ─────────────── */
function InformeFlotas({ data, setPage }) {
  const vehicles = data.companies.flatMap(comp =>
    (comp.vehicles || []).map(v => ({
      ...v,
      companyId: comp.id,
      companyName: comp.name,
      companyPhone: comp.phone || "",
    }))
  );
  const maquinas = data.maquinas || [];

  // Calcular nivel de cada vehículo
  function nivelEntidad(entidad) {
    const alerts = calcAlertas(entidad.gpsConfig || {});
    if (alerts.some(a => a.nivel === "critico")) return "critico";
    if (alerts.some(a => a.nivel === "prevencion")) return "prevencion";
    if (entidad.gpsConfig?.kmActuales) return "ok";
    return "sin_gps";
  }

  // Agrupar por empresa
  const empresasConVehiculos = data.companies.map(comp => {
    const vehs = (comp.vehicles || []).map(v => ({
      ...v, companyId: comp.id, companyName: comp.name, companyPhone: comp.phone || ""
    }));
    const maqsEmp = maquinas.filter(m => m.empresaId === comp.id);
    const todas = [...vehs, ...maqsEmp];
    const tieneCritico   = todas.some(e => nivelEntidad(e) === "critico");
    const tienePrevencion = todas.some(e => nivelEntidad(e) === "prevencion");
    const nivel = tieneCritico ? "critico" : tienePrevencion ? "prevencion" : "ok";
    return { comp, vehs, maqsEmp, nivel };
  }).filter(e => e.vehs.length > 0 || e.maqsEmp.length > 0)
    .sort((a, b) => {
      const orden = { critico: 0, prevencion: 1, ok: 2 };
      return orden[a.nivel] - orden[b.nivel];
    });

  const totalCriticos   = vehicles.filter(v => nivelEntidad(v) === "critico").length + maquinas.filter(m => nivelEntidad(m) === "critico").length;
  const totalPrevencion = vehicles.filter(v => nivelEntidad(v) === "prevencion").length + maquinas.filter(m => nivelEntidad(m) === "prevencion").length;
  const totalOk         = vehicles.filter(v => nivelEntidad(v) === "ok").length + maquinas.filter(m => nivelEntidad(m) === "ok").length;

  function colorNivel(nivel) {
    if (nivel === "critico")   return { color:"#ef4444", bg:"#ef444422", border:"#ef444444", icon:"🔴" };
    if (nivel === "prevencion") return { color:"#f59e0b", bg:"#f59e0b22", border:"#f59e0b44", icon:"🟡" };
    if (nivel === "ok")        return { color:"#10b981", bg:"#10b98122", border:"#10b98144", icon:"🟢" };
    return { color:"#4b5563", bg:"#1a1a1a", border:"#2a2a2a", icon:"⚫" };
  }

  function enviarWppEmpresa(comp, vehs, maqsEmp) {
    const fecha = new Date().toLocaleDateString("es-AR");
    let msg = `📋 *INFORME DE FLOTA — ASN Control Vehicular*\n`;
    msg += `🏢 *${comp.name}*\n📅 ${fecha}\n`;
    msg += `━━━━━━━━━━━━━━━━━━━━\n`;
    [...vehs, ...maqsEmp].forEach(e => {
      const alerts = calcAlertas(e.gpsConfig || {});
      const criticos = alerts.filter(a => a.nivel === "critico");
      const prev = alerts.filter(a => a.nivel === "prevencion");
      const nombre = e.plate ? `🚛 ${e.plate} ${e.vehicle||""}` : `🏗️ ${e.nombre||"Máquina"}`;
      const km = e.gpsConfig?.kmActuales ? ` — ${Number(e.gpsConfig.kmActuales).toLocaleString()} km` : "";
      msg += `\n${nombre}${km}\n`;
      criticos.forEach(a => { msg += `  🔴 ${a.msg}\n`; });
      prev.forEach(a => { msg += `  🟡 ${a.msg}\n`; });
      if (!criticos.length && !prev.length && e.gpsConfig?.kmActuales) msg += `  🟢 OK\n`;
      if (!e.gpsConfig?.kmActuales) msg += `  ⚫ Sin datos GPS\n`;
    });
    msg += `\n━━━━━━━━━━━━━━━━━━━━\n_ASN · Control y Prevención Vehicular_`;
    const phone = (comp.phone||"").replace(/\D/g,"");
    const url = phone ? `https://wa.me/54${phone}?text=${encodeURIComponent(msg)}` : `https://wa.me/?text=${encodeURIComponent(msg)}`;
    window.open(url, "_blank");
  }

  return (
    <div style={{ padding:"14px 14px 100px", animation:"fadeSlideIn 0.2s ease" }}>
      <button onClick={() => setPage("gps")} style={{ background:"none", border:"none", color:"#10b981", cursor:"pointer", fontSize:14, fontWeight:700, marginBottom:16, padding:0 }}>← Volver</button>
      <h2 style={{ color:"#f59e0b", margin:"0 0 4px", fontSize:22, fontWeight:900 }}>📋 Informe de Flotas</h2>
      <p style={{ color:"#6b7280", fontSize:13, margin:"0 0 16px" }}>Estado de todas las empresas con GPS</p>

      {/* Resumen */}
      <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr 1fr", gap:10, marginBottom:20 }}>
        <div style={{ background:"rgba(239,68,68,0.07)", border:"1px solid rgba(239,68,68,0.2)", borderRadius:14, padding:"12px 8px", textAlign:"center" }}>
          <div style={{ color:"#ef4444", fontWeight:900, fontSize:22 }}>{totalCriticos}</div>
          <div style={{ color:"#ef4444", fontSize:10, fontWeight:700 }}>CRÍTICOS</div>
        </div>
        <div style={{ background:"rgba(245,158,11,0.07)", border:"1px solid rgba(245,158,11,0.2)", borderRadius:14, padding:"12px 8px", textAlign:"center" }}>
          <div style={{ color:"#f59e0b", fontWeight:900, fontSize:22 }}>{totalPrevencion}</div>
          <div style={{ color:"#f59e0b", fontSize:10, fontWeight:700 }}>PREVENCIÓN</div>
        </div>
        <div style={{ background:"rgba(16,185,129,0.07)", border:"1px solid rgba(16,185,129,0.2)", borderRadius:14, padding:"12px 8px", textAlign:"center" }}>
          <div style={{ color:"#10b981", fontWeight:900, fontSize:22 }}>{totalOk}</div>
          <div style={{ color:"#10b981", fontSize:10, fontWeight:700 }}>OK</div>
        </div>
      </div>

      {empresasConVehiculos.length === 0
        ? <div style={{ textAlign:"center", color:"#4b5563", padding:"40px 0" }}>
            <div style={{ fontSize:48, marginBottom:12 }}>🏢</div>
            <div>No hay empresas con vehículos registrados</div>
            <button onClick={() => setPage("companies")} style={{ marginTop:12, padding:"10px 20px", borderRadius:10, background:"rgba(96,165,250,0.07)", border:"1px solid rgba(96,165,250,0.2)", color:"#60a5fa", fontWeight:700, cursor:"pointer", fontSize:13 }}>
              → Ir a Empresas
            </button>
          </div>
        : empresasConVehiculos.map(({ comp, vehs, maqsEmp, nivel }) => {
            const c = colorNivel(nivel);
            return (
              <div key={comp.id} style={{ background:"#1a1a1a", borderRadius:16, padding:16, border:`1px solid ${c.border}`, marginBottom:14 }}>
                {/* Header empresa */}
                <div style={{ display:"flex", alignItems:"center", gap:10, marginBottom:12 }}>
                  <div style={{ width:40, height:40, borderRadius:12, background:c.bg, border:`2px solid ${c.color}`, display:"flex", alignItems:"center", justifyContent:"center", fontSize:20, flexShrink:0 }}>🏢</div>
                  <div style={{ flex:1 }}>
                    <div style={{ color:"#f1f5f9", fontWeight:900, fontSize:15 }}>{comp.name}</div>
                    <div style={{ color:c.color, fontSize:11, fontWeight:700 }}>{c.icon} {nivel === "critico" ? "ATENCIÓN URGENTE" : nivel === "prevencion" ? "PREVENCIÓN" : nivel === "ok" ? "TODO OK" : "SIN GPS"}</div>
                  </div>
                  <button onClick={() => enviarWppEmpresa(comp, vehs, maqsEmp)}
                    style={{ padding:"8px 10px", borderRadius:10, background:"#25d36622", border:"1px solid #25d36644", color:"#25d366", fontWeight:700, fontSize:11, cursor:"pointer" }}>
                    💬 WA
                  </button>
                </div>

                {/* Vehículos */}
                {[...vehs, ...maqsEmp].map(e => {
                  const alerts = calcAlertas(e.gpsConfig || {});
                  const criticos = alerts.filter(a => a.nivel === "critico");
                  const prev = alerts.filter(a => a.nivel === "prevencion");
                  const nv = nivelEntidad(e);
                  const nc = colorNivel(nv);
                  const esVehiculo = !!e.plate;
                  return (
                    <div key={e.id} style={{ background:"#111", borderRadius:12, padding:"10px 12px", marginBottom:8, border:`1px solid ${nc.border}` }}>
                      <div style={{ display:"flex", alignItems:"center", gap:8, marginBottom: (criticos.length || prev.length) ? 6 : 0 }}>
                        <span style={{ fontSize:16 }}>{esVehiculo ? "🚛" : "🏗️"}</span>
                        <div style={{ flex:1 }}>
                          <span style={{ color:"#f1f5f9", fontWeight:700, fontSize:13 }}>{esVehiculo ? e.plate : (e.nombre || "Máquina")}</span>
                          {esVehiculo && e.vehicle && <span style={{ color:"#6b7280", fontSize:11, marginLeft:6 }}>{e.vehicle}</span>}
                          {e.gpsConfig?.kmActuales && <span style={{ color:"#9ca3af", fontSize:11, marginLeft:6 }}>· {Number(e.gpsConfig.kmActuales).toLocaleString()} km</span>}
                        </div>
                        <span style={{ fontSize:14 }}>{nc.icon}</span>
                      </div>
                      {criticos.map((a, i) => <div key={i} style={{ color:"#ef4444", fontSize:11, paddingLeft:24, marginBottom:2 }}>🔴 {a.msg}</div>)}
                      {prev.map((a, i) => <div key={i} style={{ color:"#f59e0b", fontSize:11, paddingLeft:24, marginBottom:2 }}>🟡 {a.msg}</div>)}
                      {!e.gpsConfig?.kmActuales && <div style={{ color:"#4b5563", fontSize:11, paddingLeft:24 }}>Sin datos GPS configurados</div>}
                    </div>
                  );
                })}
              </div>
            );
          })
      }
    </div>
  );
}

/* ─────────────── GPS ALERTAS ─────────────── */
function GpsAlertas({ data, setPage }) {
  const [tab, setTab] = useState("empresas"); // "empresas" | "maquinas"
  const [search, setSearch] = useState("");
  const [configModal, setConfigModal] = useState(null); // { entidad, tipo }

  // Construir lista de vehículos de empresa
  const vehicles = data.companies.flatMap(comp =>
    (comp.vehicles || []).map(v => ({
      ...v,
      companyId:   comp.id,
      companyName: comp.name,
      companyPhone: comp.phone || "",
      _companyRaw: comp,
    }))
  );

  const maquinas = data.maquinas || [];

  // Filtro
  const filteredVehicles = vehicles.filter(v =>
    (v.plate||"").toLowerCase().includes(search.toLowerCase()) ||
    (v.vehicle||"").toLowerCase().includes(search.toLowerCase()) ||
    (v.companyName||"").toLowerCase().includes(search.toLowerCase()) ||
    (v.nroMovil||"").toLowerCase().includes(search.toLowerCase())
  );
  const filteredMaquinas = maquinas.filter(m =>
    (m.nombre||"").toLowerCase().includes(search.toLowerCase()) ||
    (m.cantera||"").toLowerCase().includes(search.toLowerCase()) ||
    (m.dominio||"").toLowerCase().includes(search.toLowerCase())
  );

  // Resumen de alertas globales
  const allVehicleAlerts = vehicles.flatMap(v => calcAlertas(v.gpsConfig || {}));
  const allMaquinaAlerts = maquinas.flatMap(m => calcAlertas(m.gpsConfig || {}));
  const allAlerts = [...allVehicleAlerts, ...allMaquinaAlerts];
  const totalCriticos   = allAlerts.filter(a => a.nivel === "critico").length;
  const totalPrevencion = allAlerts.filter(a => a.nivel === "prevencion").length;

  // Guardar gpsConfig en Firebase
  async function saveVehicleConfig(vehicle, cfg) {
    const comp = data.companies.find(c => c.id === vehicle.companyId);
    if (!comp) return;
    const updatedVehicles = (comp.vehicles || []).map(v =>
      v.id === vehicle.id ? { ...v, gpsConfig: cfg } : v
    );
    await fbUpdate("companies", comp.id, { vehicles: updatedVehicles });
  }

  async function saveMaquinaConfig(maquina, cfg) {
    await fbUpdate("maquinas", maquina.id, { gpsConfig: cfg });
  }

  function sendWhatsApp(entidad, tipo) {
    const alerts = calcAlertas(entidad.gpsConfig || {});
    const msg = generarWppAlerta(entidad, tipo, alerts);
    // Intentar usar el teléfono del responsable
    const phone = tipo === "vehicle"
      ? (entidad.companyPhone || "").replace(/\D/g, "")
      : (entidad.phone || "").replace(/\D/g, "");
    const url = phone
      ? `https://wa.me/54${phone}?text=${encodeURIComponent(msg)}`
      : `https://wa.me/?text=${encodeURIComponent(msg)}`;
    window.open(url, "_blank");
  }

  return (
    <div style={{ padding:"14px 14px 100px", animation:"fadeSlideIn 0.2s ease" }}>
      {/* Título */}
      <div style={{ marginBottom:16 }}>
        <h2 style={{ color:"#10b981", margin:"0 0 4px", fontSize:22, fontWeight:900 }}>📡 GPS & Alertas</h2>
        <p style={{ color:"#6b7280", fontSize:13, margin:0 }}>Monitoreo de flota y maquinaria pesada</p>
      </div>

      {/* Botón Informe de Flotas */}
      <button onClick={() => setPage("informe-flotas")}
        style={{ width:"100%", padding:"14px", marginBottom:16, background:"linear-gradient(135deg,#f59e0b,#d97706)", border:"none", borderRadius:14, color:"#fff", fontWeight:900, fontSize:15, cursor:"pointer", display:"flex", alignItems:"center", justifyContent:"center", gap:10 }}>
        📋 Informe de Flotas
      </button>

      {/* Resumen global */}
      <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr 1fr", gap:10, marginBottom:16 }}>
        <div style={{ background:"rgba(239,68,68,0.07)", border:"1px solid rgba(239,68,68,0.2)", borderRadius:14,
          padding:"12px 8px", textAlign:"center" }}>
          <div style={{ color:"#ef4444", fontWeight:900, fontSize:22 }}>{totalCriticos}</div>
          <div style={{ color:"#ef4444", fontSize:10, fontWeight:700 }}>CRÍTICOS</div>
        </div>
        <div style={{ background:"rgba(245,158,11,0.07)", border:"1px solid rgba(245,158,11,0.2)", borderRadius:14,
          padding:"12px 8px", textAlign:"center" }}>
          <div style={{ color:"#f59e0b", fontWeight:900, fontSize:22 }}>{totalPrevencion}</div>
          <div style={{ color:"#f59e0b", fontSize:10, fontWeight:700 }}>PREVENCIÓN</div>
        </div>
        <div style={{ background:"rgba(16,185,129,0.07)", border:"1px solid rgba(16,185,129,0.2)", borderRadius:14,
          padding:"12px 8px", textAlign:"center" }}>
          <div style={{ color:"#10b981", fontWeight:900, fontSize:22 }}>{vehicles.length + maquinas.length}</div>
          <div style={{ color:"#10b981", fontSize:10, fontWeight:700 }}>UNIDADES</div>
        </div>
      </div>

      {/* Info webhook */}
      <div style={{ background:"#080808", borderRadius:14, padding:"12px 14px",
        border:"1px solid #10b98133", marginBottom:16, display:"flex", gap:10, alignItems:"flex-start" }}>
        <span style={{ fontSize:20 }}>🔗</span>
        <div>
          <div style={{ color:"#10b981", fontWeight:700, fontSize:13, marginBottom:4 }}>Webhook GPS activo</div>
          <div style={{ color:"#4b5563", fontSize:11, lineHeight:1.5 }}>
            Los proveedores GPS (Teltonika, Skypatrol, Wialon, Tracksolid, etc.) pueden enviar
            datos automáticamente a este sistema. Los KM y horas de motor se actualizarán en tiempo real.
          </div>
        </div>
      </div>

      {/* Tabs */}
      <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:8, marginBottom:16 }}>
        {[
          { id:"empresas",  label:`🚛 Flota (${vehicles.length})` },
          { id:"maquinas",  label:`🏗️ Maquinaria (${maquinas.length})` },
        ].map(t => (
          <button key={t.id} onClick={() => setTab(t.id)}
            style={{ padding:"10px", borderRadius:12, cursor:"pointer", fontWeight:700, fontSize:13,
              border:`2px solid ${tab===t.id ? "#10b981" : "#2a2a2a"}`,
              background: tab===t.id ? "#10b98122" : "#1a1a1a",
              color: tab===t.id ? "#10b981" : "#6b7280" }}>
            {t.label}
          </button>
        ))}
      </div>

      {/* Buscador */}
      <input value={search} onChange={e => setSearch(e.target.value)}
        placeholder="Buscar por dominio, empresa..."
        style={{ width:"100%", padding:"11px 14px", borderRadius:12, background:"#1a1a1a",
          border:"1px solid #333", color:"#e5e7eb", fontSize:14, marginBottom:14, outline:"none" }}/>

      {/* Lista vehículos de empresa */}
      {tab === "empresas" && (
        filteredVehicles.length === 0
          ? <div style={{ textAlign:"center", color:"#4b5563", padding:"32px 0" }}>
              <div style={{ fontSize:40, marginBottom:10 }}>🚛</div>
              <div>Sin vehículos de empresa registrados</div>
              <button onClick={() => setPage("companies")}
                style={{ marginTop:12, padding:"10px 20px", borderRadius:10, background:"#60a5fa22",
                  border:"1px solid #60a5fa44", color:"#60a5fa", fontWeight:700, cursor:"pointer", fontSize:13 }}>
                → Ir a Empresas
              </button>
            </div>
          : filteredVehicles.map(v => (
              <GpsEntidadCard
                key={v.id}
                entidad={v}
                tipo="vehicle"
                onConfigClick={() => setConfigModal({ entidad: v, tipo:"vehicle" })}
                onWhatsApp={() => sendWhatsApp(v, "vehicle")}
              />
            ))
      )}

      {/* Lista maquinaria */}
      {tab === "maquinas" && (
        filteredMaquinas.length === 0
          ? <div style={{ textAlign:"center", color:"#4b5563", padding:"32px 0" }}>
              <div style={{ fontSize:40, marginBottom:10 }}>🏗️</div>
              <div>Sin maquinaria registrada</div>
              <button onClick={() => setPage("maquinaria")}
                style={{ marginTop:12, padding:"10px 20px", borderRadius:10, background:"#a78bfa22",
                  border:"1px solid #a78bfa44", color:"#a78bfa", fontWeight:700, cursor:"pointer", fontSize:13 }}>
                → Ir a Maquinaria
              </button>
            </div>
          : filteredMaquinas.map(m => (
              <GpsEntidadCard
                key={m.id}
                entidad={m}
                tipo="maquina"
                onConfigClick={() => setConfigModal({ entidad: m, tipo:"maquina" })}
                onWhatsApp={() => sendWhatsApp(m, "maquina")}
              />
            ))
      )}

      {/* Modal configuración */}
      {configModal && (
        <GpsConfigModal
          entidad={configModal.entidad}
          tipo={configModal.tipo}
          onSave={cfg =>
            configModal.tipo === "vehicle"
              ? saveVehicleConfig(configModal.entidad, cfg)
              : saveMaquinaConfig(configModal.entidad, cfg)
          }
          onClose={() => setConfigModal(null)}
        />
      )}
    </div>
  );
}

/* ─────────────── APP ─────────────── */
function App() {
  const firebaseReady = useFirebase();
  const [page, setPage] = useState("dashboard");
  const [data, setData] = useState({ clients: [], checks: [], companies: [], maquinas: [] });
  const [selectedClient, setSelectedClient] = useState(null);
  const [selectedCompany, setSelectedCompany] = useState(null);
  const [selectedVehicle, setSelectedVehicle] = useState(null);
  const [selectedMaquina, setSelectedMaquina] = useState(null);
  const [checkPreselectedClientId, setCheckPreselectedClientId] = useState(null);
  const [loading, setLoading] = useState(true);

  useEffect(() => {
    if (!firebaseReady) return;
    const { db, collection, onSnapshot } = window._firebase;

    const unsubClients = onSnapshot(collection(db, "clients"), snap => {
      const clients = snap.docs.map(d => ({ ...d.data(), id: d.id }));
      setData(prev => ({ ...prev, clients }));
      setLoading(false);
    });
    const unsubChecks = onSnapshot(collection(db, "checks"), snap => {
      const checks = snap.docs.map(d => ({ ...d.data(), id: d.id }));
      setData(prev => ({ ...prev, checks }));
    });
    const unsubCompanies = onSnapshot(collection(db, "companies"), snap => {
      const companies = snap.docs.map(d => ({ ...d.data(), id: d.id }));
      setData(prev => ({ ...prev, companies }));
      setSelectedCompany(prev => {
        if (!prev) return prev;
        return companies.find(c => c.id === prev.id) || prev;
      });
    });
    const unsubMaquinas = onSnapshot(collection(db, "maquinas"), snap => {
      const maquinas = snap.docs.map(d => ({ ...d.data(), id: d.id }));
      setData(prev => ({ ...prev, maquinas }));
      setSelectedMaquina(prev => {
        if (!prev) return prev;
        return maquinas.find(m => m.id === prev.id) || prev;
      });
    });

    return () => { unsubClients(); unsubChecks(); unsubCompanies(); unsubMaquinas(); };
  }, [firebaseReady]);

  if (!firebaseReady || loading) return (
    <div style={{ display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", height:"100vh", gap:20, background:"radial-gradient(ellipse at center, #111 0%, #060606 70%)" }}>
      <div style={{ position:"relative" }}>
        <div style={{ position:"absolute", inset:-20, borderRadius:"50%", background:"radial-gradient(circle, rgba(249,115,22,0.08) 0%, transparent 70%)" }}/>
        <ASNLogo size={110}/>
      </div>
      <div style={{ textAlign:"center" }}>
        <div style={{ fontFamily:"'Barlow Condensed',system-ui,sans-serif", fontWeight:900, fontSize:26, letterSpacing:"0.05em", marginBottom:4 }}>
          <span style={{ color:"#c8cdd4" }}>AS</span><span style={{ color:"#f97316" }}>N</span>
        </div>
        <div style={{ color:"#3d4451", fontSize:10, letterSpacing:"0.22em", textTransform:"uppercase", fontWeight:600 }}>Control y Prevención Vehicular</div>
      </div>
      <div style={{ display:"flex", flexDirection:"column", alignItems:"center", gap:6, marginTop:4 }}>
        <div style={{ width:48, height:2, borderRadius:2, background:"linear-gradient(90deg,#f97316,#ea580c)", animation:"pulsebar 1.2s ease-in-out infinite", boxShadow:"0 0 10px rgba(249,115,22,0.4)" }}/>
        <div style={{ color:"#3d4451", fontSize:11, letterSpacing:"0.08em" }}>CONECTANDO...</div>
      </div>
      <style>{`@keyframes pulsebar { 0%,100%{opacity:0.4;transform:scaleX(0.5)} 50%{opacity:1;transform:scaleX(1)} }`}</style>
    </div>
  );

  const totalEntities = data.clients.length + data.companies.reduce((a,c) => a + (c.vehicles||[]).length, 0);

  return (
    <div style={{ minHeight:"100vh", background:"#080808", fontFamily:"'Barlow', system-ui, sans-serif", color:"#e8eaed" }}>
      <div style={{ background:"linear-gradient(180deg,#111,#0a0a0a)", borderBottom:"1px solid rgba(249,115,22,0.15)", padding:"10px 16px 9px", display:"flex", alignItems:"center", gap:12, position:"sticky", top:0, zIndex:50, boxShadow:"0 2px 32px rgba(0,0,0,0.9), 0 1px 0 rgba(249,115,22,0.08)" }}>
        <ASNLogo size={40}/>
        <div>
          <div style={{ fontFamily:"'Barlow Condensed',system-ui,sans-serif", fontWeight:900, fontSize:21, lineHeight:1, letterSpacing:"0.02em" }}>
            <span style={{ color:"#c8cdd4" }}>AS</span><span style={{ color:"#f97316" }}>N</span>
          </div>
          <div style={{ color:"#3d4451", fontSize:8, letterSpacing:"0.2em", textTransform:"uppercase", marginTop:2, fontWeight:600 }}>Control · Prevención Vehicular</div>
        </div>
        <div style={{ flex:1 }}/>
        <div style={{ background:"rgba(249,115,22,0.07)", border:"1px solid rgba(249,115,22,0.2)", borderRadius:20, padding:"4px 12px", color:"#f97316", fontSize:10, fontWeight:800, letterSpacing:"0.08em" }}>{totalEntities} VEH</div>
        <div style={{ width:28, height:28, borderRadius:8, background:"rgba(16,185,129,0.07)", border:"1px solid rgba(16,185,129,0.2)", display:"flex", alignItems:"center", justifyContent:"center", fontSize:14 }}>☁️</div>
      </div>

      {page === "dashboard"      && <Dashboard data={data} setPage={setPage}/>}
      {page === "clients"        && <ClientList data={data} setPage={setPage} setSelectedClient={setSelectedClient}/>}
      {page === "client-detail"  && selectedClient && <ClientDetail client={data.clients.find(c => c.id === selectedClient.id) || selectedClient} data={data} setPage={setPage} setCheckPreselectedClientId={setCheckPreselectedClientId}/>}
      {page === "new-client"     && <NewClient data={data} setPage={setPage}/>}
      {page === "companies"      && <Companies data={data} setPage={setPage} setSelectedCompany={setSelectedCompany}/>}
      {page === "new-company"    && <NewCompany setPage={setPage}/>}
      {page === "company-detail" && (selectedCompany
        ? <CompanyDetail company={selectedCompany} data={data} setPage={setPage} setSelectedCompany={setSelectedCompany} setSelectedVehicle={setSelectedVehicle} setSelectedMaquina={setSelectedMaquina}/>
        : <div style={{ display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", height:"60vh", gap:12, color:"#6b7280" }}><span style={{ fontSize:48 }}>🏢</span><span style={{ fontSize:15 }}>Seleccioná una empresa desde el listado.</span><button onClick={() => setPage("companies")} style={{ marginTop:8, padding:"10px 24px", borderRadius:12, background:"#3b82f622", border:"1px solid #3b82f644", color:"#60a5fa", fontWeight:700, cursor:"pointer" }}>← Ir a Empresas</button></div>
      )}
      {page === "vehicle-detail" && (selectedVehicle
        ? <VehicleDetail vehicle={selectedVehicle} data={data} setPage={setPage}/>
        : <div style={{ display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", height:"60vh", gap:12, color:"#6b7280" }}><span style={{ fontSize:48 }}>🚛</span><span style={{ fontSize:15 }}>Seleccioná un vehículo desde la empresa.</span><button onClick={() => setPage("companies")} style={{ marginTop:8, padding:"10px 24px", borderRadius:12, background:"#3b82f622", border:"1px solid #3b82f644", color:"#60a5fa", fontWeight:700, cursor:"pointer" }}>← Ir a Empresas</button></div>
      )}
      {page === "repairs"        && <RepairsPage data={data} setPage={setPage}/>}
      {page === "gps"            && <GpsAlertas data={data} setPage={setPage}/>}
      {page === "informe-flotas" && <InformeFlotas data={data} setPage={setPage}/>}
      {page === "checks"         && <Checks data={data} setPage={setPage} preselectedClientId={checkPreselectedClientId}/>}
      {page === "maquinaria"     && <MaquinariaList data={data} setPage={setPage} setSelectedMaquina={setSelectedMaquina}/>}
      {page === "new-maquina"    && <NewMaquina setPage={setPage} data={data}/>}
      {page === "maquina-detail" && (selectedMaquina
        ? <MaquinaDetail maquina={selectedMaquina} data={data} setPage={setPage} setSelectedMaquina={setSelectedMaquina}/>
        : <div style={{ display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", height:"60vh", gap:12, color:"#6b7280" }}><span style={{ fontSize:48 }}>🏗️</span><span style={{ fontSize:15 }}>Seleccioná una máquina desde el listado.</span><button onClick={() => setPage("maquinaria")} style={{ marginTop:8, padding:"10px 24px", borderRadius:12, background:"#7c3aed22", border:"1px solid #7c3aed44", color:"#a78bfa", fontWeight:700, cursor:"pointer" }}>← Ir a Maquinaria</button></div>
      )}

      <Nav page={page} setPage={setPage}/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(
  <ErrorBoundary><App/></ErrorBoundary>
);
</script>

<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').catch(() => {});
  });
}
</script>
</body>
</html>
